# Default values for discourse.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replica count for the StatefulSet
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: docker.ethquokkaops.io/ethquokkaops/discourse
  # This sets the pull policy for images.
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Forum configuration
forum:
  name: "default"
  version: "v2025.11.0"
  hostname: "forum.discource.example"
  workers: 4
  admins: []
  letsencrypt:
    email: john@doe.com
  mail:
    host: smtp.example.com
    port: 587
    user: mailuser
    password: mailpass
    # existingSecret: ""  # Name of existing secret containing DISCOURSE_SMTP_USER_NAME and DISCOURSE_SMTP_PASSWORD


# Persistence configuration
persistence:
  enabled: true
  shared:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 32Gi
  logs:
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 5Gi

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

# Discourse's official launcher-style image bakes in services that run as
# root (postgres, redis, nginx, sidekiq managed by runit). We can't drop
# privileges without rebuilding the image, so we leave securityContext empty
# and silence kube-score's uid/gid check on the StatefulSet itself.
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: LoadBalancer
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80
  httpsPort: 443
  # Additional labels for the service
  labels: {}
  # Additional annotations for the service
  annotations: {}

resources:
  requests:
    cpu: 500m
    memory: 2Gi
    ephemeral-storage: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi
    ephemeral-storage: 2Gi

# Probes split by handler so a slow app sheds traffic without being killed.
# readiness: HTTP GET on the main entry point — must serve a response.
# liveness:  TCP socket check on :http — only restarts if the process dies.
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3


# NetworkPolicy gating ingress to the HTTP/HTTPS ports and allowing all egress
# (Discourse needs to reach SMTP, the DB, Let's Encrypt, RubyGems, etc.).
# Operators should tighten egress per-environment.
networkPolicy:
  enabled: true
  ingress:
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
  egress:
    - {}

# PodDisruptionBudget keeps the StatefulSet drainable while ensuring the
# control plane respects a voluntary disruption budget. maxUnavailable: 1
# works for any replica count.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
  # minAvailable: ""

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
