apiVersion: v1
kind: Service
metadata:
  name: {{ include "discourse.fullname" . }}-headless
  labels:
    {{- include "discourse.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.httpsPort }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "discourse.selectorLabels" . | nindent 4 }}
