apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-svc
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-cryptpad
  {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-cryptpad
  ports:
    - name: http
      port: 3000
    - name: websocket
      port: 3003
