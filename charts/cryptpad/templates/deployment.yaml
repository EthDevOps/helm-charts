apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cryptpad
  annotations:
    # The cryptpad image bakes in USER 4001, so we cannot raise the uid/gid
    # above 10000 without rebuilding upstream. Silence the kube-score check.
    kube-score/ignore: container-security-context-user-group-id
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    app: {{ .Release.Name }}-cryptpad
    app.kubernetes.io/component: cryptpad
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: cryptpad
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        app: {{ .Release.Name }}-cryptpad
        app.kubernetes.io/component: cryptpad
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Release.Name }}-cryptpad
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        env:
        - name: CPAD_MAIN_DOMAIN
          value: {{ .Values.baseDomain | quote }}
        - name: CPAD_SANDBOX_DOMAIN
          value: {{ .Values.sandboxDomain | quote }}
        - name: CPAD_CONF
          value: "/cryptpad/config/config.js"
        - name: CPAD_INSTALL_ONLYOFFICE
          value: "yes"
        {{- if .Values.sso.existingSecret }}
        - name: SSO_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.sso.existingSecret }}
              key: {{ .Values.sso.secretKeys.client_id }}
        - name: SSO_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.sso.existingSecret }}
              key: {{ .Values.sso.secretKeys.client_secret }}
        {{- end }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: websocket
          containerPort: 3003
          protocol: TCP
        {{- with .Values.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: config
          readOnly: true
          mountPath: /cryptpad/config/config.js
          subPath: config.js
        - name: config
          readOnly: true
          mountPath: /cryptpad/customize/application_config.js
          subPath: application_config.js
        - name: config
          readOnly: true
          mountPath: /cryptpad/config/sso.js
          subPath: sso.js
        - name: blob
          mountPath: /cryptpad/blob
        - name: block
          mountPath: /cryptpad/block
        - name: datastore
          mountPath: /cryptpad/data
        - name: files
          mountPath: /cryptpad/datastore
        - name: openoffice
          mountPath: /cryptpad/openoffice
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: config
        configMap:
          name: {{ .Release.Name }}-config
      {{- if .Values.sso.existingSecret }}
      - name: sso-secret
        secret:
          secretName: {{ .Values.sso.existingSecret }}
      {{- end }}
      - name: blob
        persistentVolumeClaim: 
          claimName: {{ .Release.Name }}-blob
      - name: block
        persistentVolumeClaim: 
          claimName: {{ .Release.Name }}-block
      - name: datastore
        persistentVolumeClaim: 
          claimName: {{ .Release.Name }}-datastore
      - name: files
        persistentVolumeClaim: 
          claimName: {{ .Release.Name }}-files
      - name: openoffice
        persistentVolumeClaim: 
          claimName: {{ .Release.Name }}-openoffice
