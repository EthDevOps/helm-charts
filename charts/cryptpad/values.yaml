commonAnnotations: {}

baseDomain: pad.example.com
sandboxDomain: sandbox.example.com
admins: []
maxUploadSize: 1
maxPremiumUploadSize: 100
loginSalt: "abcdefg"
installOffice: no
sso:
  existingSecret: "" # Name of the Kubernetes secret containing SSO credentials
  secretKeys:
    client_id: "client_id" # Key in the secret for client ID
    client_secret: "client_secret" # Key in the secret for client secret

podAnnotations: {}
podLabels: {}
extraInitContainers: []

resources:
  requests:
    cpu: 100m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi
    ephemeral-storage: 1Gi

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 6

# Pod Security Standards: defaults below satisfy the "restricted" profile.
# The cryptpad upstream image runs as uid/gid 4001; fsGroup chowns the mounted
# PVCs at startup so a privileged chown init container is no longer needed.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 4001
  runAsGroup: 4001
  fsGroup: 4001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 4001
  runAsGroup: 4001
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault
image:
  repository: docker.ethquokkaops.io/ethquokkaops/ethdevops/cryptpad-docker
  tag: main
  pullPolicy: Always

service:
  type: ClusterIP
  annotations: {}

ingress:
  enabled: true
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  tls:
    secretName: chart-example-tls

# Permissive default NetworkPolicy: ingress allowed on the cryptpad ports,
# egress unrestricted (cryptpad needs DNS + outbound for SSO/IDPs).
networkPolicy:
  enabled: true
  ingress:
    - ports:
        - port: 3000
          protocol: TCP
        - port: 3003
          protocol: TCP
  egress:
    - {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
  # minAvailable: ""  # set this instead of maxUnavailable if preferred
