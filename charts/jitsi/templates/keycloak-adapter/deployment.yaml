{{- if .Values.keycloak_adapter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-keycloak-adapter
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-keycloak-adapter
    spec:
      containers:
      - name: {{ .Release.Name }}-keycloak-adapter
        image: "{{ .Values.keycloak_adapter.imageRepository }}:{{ .Values.keycloak_adapter.imageTag }}"
        ports:
        - containerPort: 9000
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-keycloak-adapter-config
        {{- if .Values.enableAuth }}
        - secretRef:
            name: {{ include "jitsi-meet.auth.secretName" . }}
        {{- end }}
        env:
        - name: PERMISSIONS_FILE
          value: "/config-permissions/permissions.json"
        {{- if .Values.jibri.enabled }}
        # Recorder gate: jibri proves itself to /oidc/recorder with its
        # recorder XMPP password, so the adapter needs the same secret.
        - name: RECORDER_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "jitsi-meet.jibri.secretName" . }}
              key: JIBRI_RECORDER_PASSWORD
        {{- end }}
        volumeMounts:
        - name: permissions
          mountPath: /config-permissions
        resources:
          {{- toYaml .Values.keycloak_adapter.resources | nindent 12 }}

      volumes:
      - name: permissions
        configMap:
          name: {{ .Release.Name }}-keycloak-adapter-permissions
{{- end }}
