apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "jitsi-meet.web.fullname" . }}-test-connection"
  labels:
    {{- include "jitsi-meet.web.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
    kube-score/ignore: >-
      container-image-tag,
      container-image-pull-policy,
      pod-probes,
      container-resources,
      pod-networkpolicy,
      container-ephemeral-storage-request-and-limit,
      container-security-context-user-group-id
spec:
  containers:
    - name: wget
      image: {{ .Values.testConnection.image }}
      imagePullPolicy: {{ .Values.testConnection.imagePullPolicy }}
      command: ['wget']
      args: ['{{ include "jitsi-meet.web.fullname" . }}:{{ .Values.web.service.port }}']
  restartPolicy: Never
