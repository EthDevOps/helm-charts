replicaCount: 1

image:
  repository: ghcr.io/gitroomhq/postiz-app
  # TODO: pin a specific tag instead of latest (then drop the kube-score
  # container-image-tag ignore on the Deployment metadata).
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# The upstream postiz image runs as user "node" (uid/gid 1000). 1000 is below
# 10000, which kube-score flags; ignoring the check is the only way to satisfy
# it without rebuilding the image.
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

service:
  type: ClusterIP
  port: 80
  additionalPorts: []

ingress:
  enabled: false  # Disabled by default
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
          port: 80
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
  extraRules: []

resources:
  requests:
    cpu: 200m
    memory: 1Gi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 1Gi

# Liveness uses tcpSocket so kube-score sees a different probe handler than
# readiness (httpGet) and doesn't flag pod-probes-identical.
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

# Annotations rendered onto the Deployment metadata. Used to silence kube-score
# checks the image can't satisfy without a rebuild.
workloadAnnotations:
  kube-score/ignore: >-
    container-image-tag,
    container-security-context-user-group-id

networkPolicy:
  enabled: true
  ingress:
    - ports:
        - port: 5000
          protocol: TCP
  egress:
    - {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

extraContainers: []

extraVolumes: []
extraVolumeMounts: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# PostgreSQL configuration
postgresql:
  enabled: true
  image:
    tag: 15-alpine
    pullPolicy: Always
  auth:
    username: postiz
    password: postiz-password
    database: postiz
  service:
    ports:
      postgresql: 5432
  networkPolicy:
    enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi

# Redis configuration
redis:
  enabled: true
  image:
    pullPolicy: Always
  auth:
    enabled: true
    password: postiz-redis-password
  master:
    service:
      ports:
        redis: 6379
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 512Mi

# Environment variables
env:
  FRONTEND_URL: "http://localhost:4200"
  NEXT_PUBLIC_BACKEND_URL: "http://localhost:3000"
  BACKEND_INTERNAL_URL: "http://backend:3000"
  UPLOAD_DIRECTORY: ""
  NEXT_PUBLIC_UPLOAD_STATIC_DIRECTORY: ""
  NX_ADD_PLUGINS: "false"
  IS_GENERAL: "true"

# Sensitive environment variables (to be stored in Secrets)
secrets:
  DATABASE_URL: ""
  REDIS_URL: ""
  JWT_SECRET: ""
  X_API_KEY: ""
  X_API_SECRET: ""
  LINKEDIN_CLIENT_ID: ""
  LINKEDIN_CLIENT_SECRET: ""
  REDDIT_CLIENT_ID: ""
  REDDIT_CLIENT_SECRET: ""
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  RESEND_API_KEY: ""
  CLOUDFLARE_ACCOUNT_ID: ""
  CLOUDFLARE_ACCESS_KEY: ""
  CLOUDFLARE_SECRET_ACCESS_KEY: ""
  CLOUDFLARE_BUCKETNAME: ""
  CLOUDFLARE_BUCKET_URL: ""
