apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "netbox.fullname" . }}-test-connection"
  labels:
    {{- include "netbox.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test-success
    # Helm test pods are one-shot; production hardening is overkill.
    kube-score/ignore: >-
      container-image-tag,
      container-image-pull-policy,
      pod-probes,
      container-resources,
      pod-networkpolicy,
      container-ephemeral-storage-request-and-limit,
      container-security-context-user-group-id
spec:
  # Match PSS restricted so the test pod is admissible in restricted
  # namespaces. The busybox test image runs fine as an arbitrary non-root uid.
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: wget
    image: "{{ .Values.test.image.repository }}:{{ .Values.test.image.tag }}"
    imagePullPolicy: {{ .Values.test.image.pullPolicy }}
    command: ['wget']
    args: ['{{ include "netbox.fullname" . }}:{{ .Values.service.port }}']
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    {{- if .Values.test.resources }}
    resources:
      {{- toYaml .Values.test.resources | nindent 6 }}
    {{- end }}
  restartPolicy: Never
