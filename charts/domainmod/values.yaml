# DomainMod Helm Chart Values

# -- App configuration
app:
  image:
    repository: domainmod/domainmod
    # TODO: upstream domainmod/domainmod does not publish versioned tags on
    # Docker Hub; only :latest is available. Pin once an upstream releases
    # immutable tags. kube-score is ignored for container-image-tag on the
    # deployment until then.
    tag: latest
    pullPolicy: Always

  # -- Number of replicas (only 1 supported for stateful app)
  replicaCount: 1

  # -- Resource limits and requests
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext: {}
    # fsGroup: 1000

  # -- Container security context
  securityContext: {}
    # runAsUser: 1000
    # runAsGroup: 1000

  # -- Readiness probe (HTTP GET on root, expects DomainMod web root)
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  # -- Liveness probe (TCP socket; differs from readiness handler so
  # kube-score's pod-probes-identical check passes)
  livenessProbe:
    tcpSocket:
      port: http
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

  # -- Environment variables
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: "Europe/Berlin"
    DOMAINMOD_WEB_ROOT: ""

  # -- Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    # -- Additional labels for the service
    labels: {}
    # -- Additional annotations for the service
    annotations: {}

  # -- Persistence configuration for application data
  persistence:
    enabled: true
    # -- Use an existing PVC
    existingClaim: ""
    # -- Storage class for the PVC
    storageClass: ""
    # -- Access modes
    accessModes:
      - ReadWriteOnce
    # -- Size of the PVC
    size: 1Gi
    # -- Annotations for the PVC
    annotations: {}

# -- Database configuration
database:
  # -- Enable the built-in MariaDB database
  enabled: true

  image:
    repository: ghcr.io/linuxserver/mariadb
    tag: alpine
    pullPolicy: Always

  # -- Resource limits and requests
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext: {}

  # -- Container security context
  securityContext: {}

  # -- Readiness probe (TCP socket on mysql port; mariadb is ready when the
  # socket accepts connections)
  readinessProbe:
    tcpSocket:
      port: mysql
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  # -- Liveness probe (exec mysqladmin ping; differs from readiness handler
  # to satisfy kube-score's pod-probes-identical check)
  livenessProbe:
    exec:
      command:
        - sh
        - -c
        - "mysqladmin ping -h 127.0.0.1 -u root -p\"${MYSQL_ROOT_PASSWORD}\""
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

  # -- Environment variables
  env:
    PUID: "1000"
    PGID: "1000"
    TZ: "America/Vancouver"

  # -- Service configuration
  service:
    type: ClusterIP
    port: 3306

  # -- Persistence configuration for database
  persistence:
    enabled: true
    # -- Use an existing PVC
    existingClaim: ""
    # -- Storage class for the PVC
    storageClass: ""
    # -- Access modes
    accessModes:
      - ReadWriteOnce
    # -- Size of the PVC
    size: 5Gi
    # -- Annotations for the PVC
    annotations: {}

# -- Database credentials
# Used by both app and database
dbCredentials:
  # -- Database host (use release-name-db if using built-in db)
  host: ""
  # -- Database name
  database: domainmod
  # -- Database user
  user: domainmod
  # -- Database password (ignored if existingSecret is set)
  password: ""
  # -- MySQL root password (ignored if existingSecret is set)
  rootPassword: ""

  # -- Use an existing secret for database credentials
  existingSecret:
    # -- Name of the existing secret
    name: ""
    # -- Key in the secret for database password
    passwordKey: "password"
    # -- Key in the secret for root password
    rootPasswordKey: "root-password"

# -- Image pull secrets
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""

# -- Override the full name of the chart
fullnameOverride: ""

# -- Service account configuration
serviceAccount:
  # -- Create a service account
  create: false
  # -- Annotations for the service account
  annotations: {}
  # -- Name of the service account
  name: ""

# -- Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: domainmod.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: domainmod-tls
    #   hosts:
    #     - domainmod.local

# -- NetworkPolicy configuration. Defaults allow ingress on the app and db
# ports and unrestricted egress so the chart works out-of-the-box. Tighten
# per environment as needed.
networkPolicy:
  enabled: true
  # Ingress for the app pod (port 80)
  app:
    ingress:
      - ports:
          - port: 80
            protocol: TCP
    egress:
      - {}
  # Ingress for the database pod (port 3306). Only the app should reach
  # the database; the default leaves the source open so cluster operators
  # can scope it via podSelector once labels are known.
  db:
    ingress:
      - ports:
          - port: 3306
            protocol: TCP
    egress:
      - {}

# -- PodDisruptionBudget. maxUnavailable: 1 works for any replica count and
# leaves the workload drainable.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
  # minAvailable: ""
