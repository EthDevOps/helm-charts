{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-docmost
  labels:
    app: {{ .Release.Name }}-docmost
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-docmost
  policyTypes:
    - Ingress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
