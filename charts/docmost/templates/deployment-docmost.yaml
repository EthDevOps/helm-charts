apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-docmost
  labels:
    app: {{ .Release.Name }}-docmost
  annotations:
    # docmost upstream image is unpinned (defaults to :latest). Operators
    # should override image.tag with a specific version in their values.
    # See TODO in values.yaml.
    # The app container runs as uid/gid 1000 (baked into the image); the
    # fix-permissions init container needs root to chown the PVC. Both are
    # below kube-score's 10000 threshold and cannot be raised without
    # rebuilding the image.
    kube-score/ignore: container-image-tag,container-security-context-user-group-id
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-docmost
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-docmost
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: fix-permissions
          image: {{ .Values.initContainer.image }}
          imagePullPolicy: {{ .Values.initContainer.imagePullPolicy }}
          command:
            - sh
            - -c
            - chown -R 1000:1000 /app/data/storage
          volumeMounts:
            - name: docmost-storage
              mountPath: /app/data/storage
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
      containers:
        - name: docmost
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: APP_URL
              value: "https://{{ .Values.appDomain }}"
            - name: APP_SECRET
              value: "{{ .Values.appSecret }}"
            - name: DATABASE_URL
              value: "postgresql://{{ include "postgresql.v1.username" .Subcharts.postgresql }}:{{ .Values.postgresql.auth.password }}@{{ include "postgresql.v1.primary.fullname" .Subcharts.postgresql}}:{{ include "postgresql.v1.service.port" .Subcharts.postgresql }}/{{ include "postgresql.v1.database" .Subcharts.postgresql }}?schema=public"
            - name: REDIS_URL
              value: "redis://{{ printf "%s-master" (include "common.names.fullname" .Subcharts.redis) }}:{{ .Values.redis.master.service.ports.redis }}"
          {{- if .Values.mail.enabled }}
            - name: MAIL_DRIVER
              value: {{ .Values.mail.driver | quote }}
            - name: SMTP_HOST
              value: {{ .Values.mail.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.mail.port | quote }}
            - name: SMTP_SECURE
              value: {{ .Values.mail.secure | quote }}
            - name: MAIL_FROM_ADDRESS
              value: {{ .Values.mail.fromAddress | quote }}
            - name: MAIL_FROM_NAME
              value: {{ .Values.mail.fromName | quote }}
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mail.existingSecret.name }}
                  key: {{ .Values.mail.existingSecret.usernameKey }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mail.existingSecret.name }}
                  key: {{ .Values.mail.existingSecret.passwordKey }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: docmost-storage
              mountPath: /app/data/storage
      volumes:
        - name: docmost-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-docmost-pvc
