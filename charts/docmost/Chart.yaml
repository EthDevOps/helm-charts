apiVersion: v2
name: docmost
description: OpenSource alternative for Notion
type: application

version: 0.2.7

# App metadata
appVersion: "1.0.0"
maintainers:
  - name: elasticroentgen
    email: markus.keil@ethereum.org
dependencies:
- name: postgresql
  version: 1.1.9
  repository: https://ethdevops.github.io/helm-charts
  condition: postgresql.enabled
- name: redis
  version: 1.0.7
  repository: https://ethdevops.github.io/helm-charts
  condition: redis.enabled
