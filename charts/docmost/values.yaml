replicaCount: 1
appDomain: docmost.example.com
image:
  repository: docmost/docmost
  tag: latest
  pullPolicy: IfNotPresent

postgresql:
  enabled: true
  image:
    tag: 17-alpine
  auth:
    username: docmost
    password: docmost

redis:
  enabled: true
  architecture: standalone

persistence:
  size: 1Gi

mail:
  enabled: false
  driver: smtp
  host: ""
  port: ""
  secure: ""
  fromAddress: "hello@example.com"
  fromName: "Docmost"
  existingSecret:
    name: ""
    usernameKey: SMTP_USERNAME
    passwordKey: SMTP_PASSWORD

ingress:
  enabled: true
  annotations: {}
  tls:
    secretName: docmost-tls

