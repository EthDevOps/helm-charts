# -- Domain name for the AppFlowy instance
appDomain: appflowy.example.com

# -- Existing secret containing GOTRUE_JWT_SECRET
existingSecret:
  # -- Name of the secret
  name: ""
  # -- Key in the secret containing the JWT secret
  jwtSecretKey: GOTRUE_JWT_SECRET

# AppFlowy ships only :latest tags for its component images today. The
# workload metadata sets `kube-score/ignore: container-image-tag` so CI
# stays green. Pin a specific tag here when AppFlowy upstream publishes
# versioned releases per service.
# TODO: pin specific image tags once upstream publishes them.

# -- GoTrue authentication service
gotrue:
  image:
    repository: appflowyinc/gotrue
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  service:
    type: NodePort
    port: 9999
    nodePort: ""
    annotations: {}
  # -- GoTrue admin credentials (ignored if existingSecret is set)
  adminEmail: ""
  adminPassword: ""
  # -- Existing secret for admin credentials
  existingSecret:
    name: ""
    adminEmailKey: GOTRUE_ADMIN_EMAIL
    adminPasswordKey: GOTRUE_ADMIN_PASSWORD
  # -- Disable new user signups
  disableSignup: false
  # -- Auto-confirm email addresses
  mailerAutoconfirm: false
  # -- JWT expiry in seconds
  jwtExp: "7200"

# -- AppFlowy Cloud core backend
cloud:
  image:
    repository: appflowyinc/appflowy_cloud
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 1Gi
  service:
    type: NodePort
    port: 8000
    nodePort: ""
    annotations: {}
  # -- Max database connections
  databaseMaxConnections: "40"

# -- AppFlowy background worker
worker:
  image:
    repository: appflowyinc/appflowy_worker
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  # -- Import tick interval in seconds
  importTickInterval: "30"

# -- AppFlowy web frontend
web:
  image:
    repository: appflowyinc/appflowy_web
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 512Mi
  service:
    type: NodePort
    port: 80
    nodePort: ""
    annotations: {}

# -- Admin frontend dashboard
admin:
  image:
    repository: appflowyinc/admin_frontend
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 512Mi
  service:
    type: NodePort
    port: 3000
    nodePort: ""
    annotations: {}

# -- Search service (optional)
search:
  enabled: false
  image:
    repository: appflowyinc/appflowy_search
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  service:
    type: NodePort
    port: 4002
    nodePort: ""
    annotations: {}
  persistence:
    size: 5Gi
  # -- Enable background indexer
  backgroundIndexerEnabled: true
  # -- Enable database indexer
  databaseIndexerEnabled: false
  # -- Enable keyword search
  keywordSearchEnabled: true
  # -- Keyword index map size in bytes (default 2GB)
  keywordIndexMapSizeBytes: "2147483648"

# -- AI service (optional)
ai:
  enabled: false
  image:
    repository: appflowyinc/appflowy_ai
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  service:
    type: NodePort
    port: 5001
    nodePort: ""
    annotations: {}

# NetworkPolicy covering all AppFlowy app pods (admin, cloud, web, worker,
# gotrue, search, ai). Ingress permits traffic on the listening ports; egress
# is unrestricted so the apps can reach the database, redis, S3 and external
# OAuth/SMTP endpoints. Operators should tighten egress per-environment.
networkPolicy:
  enabled: true
  ingress:
    - ports:
        - port: 9999
          protocol: TCP
        - port: 8000
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 4002
          protocol: TCP
        - port: 5001
          protocol: TCP
  egress:
    - {}

# PodDisruptionBudget for the AppFlowy app deployments. maxUnavailable: 1
# keeps single-replica deployments drainable while honouring a voluntary
# disruption budget for any higher replica counts.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
  # minAvailable: ""

# -- PostgreSQL subchart configuration (pgvector required for AppFlowy)
postgresql:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg16
    # Override the IfNotPresent default; kube-score's
    # container-image-pull-policy expects Always so imagePullSecrets are
    # re-resolved on every restart.
    pullPolicy: Always
  auth:
    username: appflowy
    password: appflowy
    database: appflowy
  # Make the existing primary Service headless so the StatefulSet's
  # serviceName resolves to a Headless Service (kube-score
  # statefulset-has-servicename). Postgres clients in this chart connect via
  # DNS, so a headless Service serves traffic equivalently for a single
  # replica.
  service:
    clusterIP: None
  # Resources sized for a small AppFlowy deployment.
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 1Gi
  # Run as a high uid/gid so kube-score's user-group-id check passes. The
  # upstream postgres image entrypoint honours arbitrary uids when fsGroup
  # owns PGDATA; PGDATA is set to /var/lib/postgresql/data/pgdata by the
  # subchart, mounted from a PVC chowned to fsGroup by the kubelet.
  securityContext:
    runAsUser: 10001
    runAsNonRoot: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
        - SYS_ADMIN
        - NET_ADMIN
        - SYS_PTRACE
  podSecurityContext:
    fsGroup: 10001
    runAsGroup: 10001
  # Enable the subchart's NetworkPolicy so kube-score finds a matching
  # policy for the postgres pods. Defaults allow egress and DNS resolution.
  networkPolicy:
    enabled: true
    allowedPods: []
    allowedNamespaces: []

# -- Redis subchart configuration
redis:
  enabled: true
  architecture: standalone
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: Always
  master:
    service:
      ports:
        redis: 6379
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
      ephemeral-storage: 512Mi
  # Redis subchart doesn't ship a NetworkPolicy and doesn't expose workload
  # metadata annotations, so kube-score's `pod-networkpolicy` and uid/gid
  # checks would still flag the redis pod. The parent chart's
  # `templates/redis-extras.yaml` adds a NetworkPolicy targeting the redis
  # pod, and the subchart's `podAnnotations` carries kube-score ignores for
  # the remaining unfixable findings.
  podSecurityContext:
    fsGroup: 10001
  securityContext:
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: true
    runAsUser: 10001
  podAnnotations:
    kube-score/ignore: container-security-context-user-group-id

# -- S3 storage configuration (uses existing S3, no minio)
s3:
  # -- Create bucket on startup
  createBucket: true
  # -- Use minio-compatible endpoint
  useMinio: false
  # -- S3 bucket name
  bucket: appflowy
  # -- S3 region
  region: us-east-1
  # -- S3 endpoint URL
  endpoint: ""
  # -- Presigned URL endpoint (if different from endpoint)
  presignedUrlEndpoint: ""
  # -- Existing secret with S3 credentials
  existingSecret:
    name: ""
    accessKeyIdKey: AWS_ACCESS_KEY_ID
    secretAccessKeyKey: AWS_SECRET_ACCESS_KEY

# -- SMTP mail configuration
smtp:
  enabled: false
  host: ""
  port: "587"
  username: ""
  fromAddress: "noreply@example.com"
  fromName: "AppFlowy"
  # -- TLS kind: none, starttls, tls
  tlsKind: "starttls"
  existingSecret:
    name: ""
    passwordKey: SMTP_PASSWORD

# -- OAuth provider configuration
oauth:
  google:
    enabled: false
    redirectUri: ""
    existingSecret:
      name: ""
      clientIdKey: GOOGLE_CLIENT_ID
      clientSecretKey: GOOGLE_CLIENT_SECRET
  github:
    enabled: false
    redirectUri: ""
    existingSecret:
      name: ""
      clientIdKey: GITHUB_CLIENT_ID
      clientSecretKey: GITHUB_CLIENT_SECRET
  discord:
    enabled: false
    redirectUri: ""
    existingSecret:
      name: ""
      clientIdKey: DISCORD_CLIENT_ID
      clientSecretKey: DISCORD_CLIENT_SECRET

# -- OpenAI configuration (for search and AI services)
openai:
  existingSecret:
    name: ""
    apiKeyKey: OPENAI_API_KEY
