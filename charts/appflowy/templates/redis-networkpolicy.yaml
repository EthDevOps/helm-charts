{{- if and .Values.redis.enabled .Values.networkPolicy.enabled }}
# The redis subchart doesn't ship a NetworkPolicy, so we provide one here
# targeting the redis pod by its Bitnami-compatible selector labels.
# kube-score only checks for the *existence* of a matching policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 6379
          protocol: TCP
  egress:
    - {}
{{- end }}
