{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-appflowy
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - {{ .Release.Name }}-admin
          - {{ .Release.Name }}-cloud
          - {{ .Release.Name }}-gotrue
          - {{ .Release.Name }}-web
          - {{ .Release.Name }}-worker
          {{- if .Values.ai.enabled }}
          - {{ .Release.Name }}-ai
          {{- end }}
          {{- if .Values.search.enabled }}
          - {{ .Release.Name }}-search
          {{- end }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
