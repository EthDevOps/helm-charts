apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cloud
  annotations:
    # AppFlowy appflowy_cloud ships only :latest today and bakes in a low
    # uid; silence kube-score checks we can't satisfy without rebuilding
    # the upstream image.
    # TODO: pin a specific version once upstream publishes tagged releases.
    kube-score/ignore: container-image-tag,container-security-context-user-group-id
spec:
  replicas: {{ .Values.cloud.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-cloud
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-cloud
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: appflowy-cloud
          image: {{ .Values.cloud.image.repository }}:{{ .Values.cloud.image.tag }}
          imagePullPolicy: {{ .Values.cloud.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: RUST_LOG
              value: "info"
            - name: APPFLOWY_ENVIRONMENT
              value: "production"
            - name: APPFLOWY_DATABASE_URL
              value: {{ include "appflowy.databaseUrl" . | quote }}
            - name: APPFLOWY_REDIS_URI
              value: {{ include "appflowy.redisUrl" . | quote }}
            - name: APPFLOWY_GOTRUE_BASE_URL
              value: {{ include "appflowy.gotrueInternalUrl" . | quote }}
            - name: APPFLOWY_ACCESS_CONTROL
              value: "true"
            - name: APPFLOWY_DATABASE_MAX_CONNECTIONS
              value: {{ .Values.cloud.databaseMaxConnections | quote }}
            - name: APPFLOWY_WEB_URL
              value: {{ include "appflowy.baseUrl" . | quote }}
            - name: APPFLOWY_BASE_URL
              value: {{ include "appflowy.baseUrl" . | quote }}
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret.name }}
                  key: {{ .Values.existingSecret.jwtSecretKey }}
            - name: APPFLOWY_S3_CREATE_BUCKET
              value: {{ .Values.s3.createBucket | quote }}
            - name: APPFLOWY_S3_USE_MINIO
              value: {{ .Values.s3.useMinio | quote }}
            {{- if .Values.s3.endpoint }}
            - name: APPFLOWY_S3_MINIO_URL
              value: {{ .Values.s3.endpoint | quote }}
            {{- end }}
            - name: APPFLOWY_S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: APPFLOWY_S3_REGION
              value: {{ .Values.s3.region | quote }}
            {{- if .Values.s3.presignedUrlEndpoint }}
            - name: APPFLOWY_S3_PRESIGNED_URL_ENDPOINT
              value: {{ .Values.s3.presignedUrlEndpoint | quote }}
            {{- end }}
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret.name }}
                  key: {{ .Values.s3.existingSecret.accessKeyIdKey }}
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret.name }}
                  key: {{ .Values.s3.existingSecret.secretAccessKeyKey }}
          {{- if .Values.smtp.enabled }}
            - name: APPFLOWY_MAILER_SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: APPFLOWY_MAILER_SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: APPFLOWY_MAILER_SMTP_USERNAME
              value: {{ .Values.smtp.username | quote }}
            - name: APPFLOWY_MAILER_SMTP_EMAIL
              value: {{ .Values.smtp.fromAddress | quote }}
            - name: APPFLOWY_MAILER_SMTP_TLS_KIND
              value: {{ .Values.smtp.tlsKind | quote }}
            - name: APPFLOWY_MAILER_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret.name }}
                  key: {{ .Values.smtp.existingSecret.passwordKey }}
          {{- end }}
          {{- if .Values.search.enabled }}
            - name: APPFLOWY_SEARCH_SERVICE_URL
              value: {{ include "appflowy.searchInternalUrl" . | quote }}
          {{- end }}
          {{- with .Values.cloud.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Probes split by handler so a slow request loop doesn't restart
          # the pod: liveness only checks the TCP socket; readiness hits the
          # HTTP health endpoint.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3
