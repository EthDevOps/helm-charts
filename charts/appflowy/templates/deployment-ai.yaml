{{- if .Values.ai.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai
  annotations:
    # AppFlowy AI ships only :latest and bakes in a low uid; silence
    # kube-score checks we can't satisfy without rebuilding the upstream
    # image.
    # TODO: pin a specific version once upstream publishes tagged releases.
    kube-score/ignore: container-image-tag,container-security-context-user-group-id
spec:
  replicas: {{ .Values.ai.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ai
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ai
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: appflowy-ai
          image: {{ .Values.ai.image.repository }}:{{ .Values.ai.image.tag }}
          imagePullPolicy: {{ .Values.ai.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 5001
          env:
            - name: AI_SERVER_PORT
              value: "5001"
            - name: AI_DATABASE_URL
              value: {{ include "appflowy.databaseUrl" . | quote }}
            - name: AI_REDIS_URL
              value: {{ include "appflowy.redisUrl" . | quote }}
            - name: AI_APPFLOWY_HOST
              value: {{ include "appflowy.baseUrl" . | quote }}
            - name: APPFLOWY_GOTRUE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret.name }}
                  key: {{ .Values.existingSecret.jwtSecretKey }}
            - name: APPFLOWY_S3_USE_MINIO
              value: {{ .Values.s3.useMinio | quote }}
            {{- if .Values.s3.endpoint }}
            - name: AI_MINIO_URL
              value: {{ .Values.s3.endpoint | quote }}
            {{- end }}
            - name: APPFLOWY_S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: APPFLOWY_S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: APPFLOWY_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret.name }}
                  key: {{ .Values.s3.existingSecret.accessKeyIdKey }}
            - name: APPFLOWY_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret.name }}
                  key: {{ .Values.s3.existingSecret.secretAccessKeyKey }}
            {{- if .Values.openai.existingSecret.name }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.existingSecret.name }}
                  key: {{ .Values.openai.existingSecret.apiKeyKey }}
            {{- end }}
            - name: AI_USE_MINIO
              value: {{ .Values.s3.useMinio | quote }}
          {{- with .Values.ai.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Probes split by handler so a slow /health response doesn't kill
          # the pod: liveness uses TCP socket; readiness uses HTTP GET.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
{{- end }}
