# Global configuration
global:
  reverseProxyPort: 8000
  rpcNodeUrl: ""
baseUrl: "http://localhost"

# Image versions
# TODO: pin tags for the upstream Safe images below (`txsVersion`, `cfgVersion`,
# `cgwVersion`, `uiVersion`, `eventsVersion`). The Safe team publishes
# floating `latest` tags and consumers of this chart typically override per
# release. kube-score warns about this via `container-image-tag`; the
# Deployments below carry `kube-score/ignore: container-image-tag` until a
# pin is agreed.
images:
  txsVersion: "latest"
  cfgVersion: "latest"
  cgwVersion: "latest"
  uiVersion: "latest"
  eventsVersion: "latest"

# Nginx (reverse proxy) configuration
nginx:
  image:
    repository: nginx
    tag: "1.30.1-alpine"
    pullPolicy: Always
  replicas: 1

# Static-files sidecar nginx image used by cfg-web and txs-web pods
staticNginx:
  image:
    repository: nginx
    tag: "1.30.1-alpine"
    pullPolicy: Always

# Database configurations
databases:
  postgres:
    image:
      repository: postgres
      tag: "14-alpine"
      pullPolicy: Always
    maxConnections: 250

# Redis configurations
redis:
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: Always

# RabbitMQ configurations
rabbitmq:
  image:
    repository: rabbitmq
    tag: "3.13-alpine"
    pullPolicy: Always

# Transaction Service configuration
txs:
  replicas: 1
  image: safeglobal/safe-transaction-service
  pullPolicy: Always
  env:
    pythonPath: /app/
    djangoSettingsModule: config.settings.production
    debug: "0"
    ethL2Network: "1"
    djangoAllowedHosts: "*"
    forceScriptName: /txs/
    csrfTrustedOrigins: "http://localhost:8000"
    eventsQueueAsyncConnection: "True"
    eventsQueueExchangeName: safe-transaction-service-events

# Config Service configuration
cfg:
  replicas: 1
  image: safeglobal/safe-config-service
  pullPolicy: Always
  # Number of gunicorn workers for cfg-web. The image defaults to
  # cpu_count() * 2, which on a large node spawns dozens of workers
  # (~144Mi each) and can exhaust the pod memory limit.
  webConcurrency: 4
  env:
    pythonDontWriteBytecode: "true"
    debug: "true"
    rootLogLevel: DEBUG
    djangoAllowedHosts: "*"
    gunicornBindPort: "8001"
    dockerNginxVolumeRoot: /nginx
    nginxEnvsubstOutputDir: /etc/nginx/
    dockerWebVolume: .:/app
    gunicornWebReload: "false"
    djangoOtpAdmin: "false"
    defaultFileStorage: django.core.files.storage.FileSystemStorage
    forceScriptName: /cfg/
    cgwUrl: http://nginx:8000/cgw
    csrfTrustedOrigins: "http://localhost:8000"
    mediaUrl: "http://localhost:8000/cfg/media/"

# Client Gateway configuration
cgw:
  replicas: 1
  image: safeglobal/safe-client-gateway-nest
  pullPolicy: Always
  env:
    httpClientRequestTimeoutMilliseconds: "60000"
    safeConfigBaseUri: http://nginx:8000/cfg
    infuraApiKey: ""
    logLevel: info
    emailApiApplicationCode: ""
    emailApiFromEmail: changeme@example.com
    emailApiKey: ""
    emailTemplateRecoveryTx: ""
    emailTemplateUnknownRecoveryTx: ""
    emailTemplateVerificationCode: ""
    pushNotificationsApiProject: ""
    pushNotificationsApiServiceAccountClientEmail: changeme@example.com
    pushNotificationsApiServiceAccountPrivateKey: ""
    relayProviderApiKeyOptimism: ""
    relayProviderApiKeyBsc: ""
    relayProviderApiKeyGnosisChain: ""
    relayProviderApiKeyPolygon: ""
    relayProviderApiKeyPolygonZkevm: ""
    relayProviderApiKeyBase: ""
    relayProviderApiKeyArbitrumOne: ""
    relayProviderApiKeyAvalanche: ""
    relayProviderApiKeyLinea: ""
    relayProviderApiKeyBlast: ""
    relayProviderApiKeySepolia: ""
    stakingApiKey: ""
    stakingTestnetApiKey: ""

# Events Service configuration
events:
  replicas: 1
  image: safeglobal/safe-events-service
  pullPolicy: Always
  env:
    amqpExchange: safe-transaction-service-events
    amqpQueue: safe-events-service
    webhooksCacheTtl: "300000"
    nodeEnv: production
    urlBasePath: /events

# UI configuration
ui:
  replicas: 1
  image: safeglobal/safe-wallet-web
  pullPolicy: Always
  env:
    nextPublicInfuraToken: ""
    nextPublicGatewayUrlProduction: http://localhost:8000/cgw
    nextPublicSafeAppsInfuraToken: ""
    nextPublicTenderlySimulateEndpointUrl: ""
    nextPublicTenderlyProjectName: ""
    nextPublicTenderlyOrgName: ""
    nextPublicIsProduction: "true"
    nextPublicSafeVersion: "1.4.1"
    nextPublicSentryDsn: ""
    nextPublicBeamerId: ""
    nextPublicWcBridge: ""
    nextPublicFortmaticKey: ""
    nextPublicPortisKey: ""
    nextPublicCypressMnemonic: ""

# Service configurations
services:
  nginx:
    type: LoadBalancer
    port: 8000
  txsWeb:
    type: ClusterIP
    port: 8000
  cfgWeb:
    type: ClusterIP
    port: 8001
  cgwWeb:
    type: ClusterIP
    port: 3000
  eventsWeb:
    type: ClusterIP
    port: 3000
  ui:
    type: ClusterIP
    port: 8080

# Persistent Volume configurations
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi

# Default resources applied to every workload container.
# Each component can override these with its own `resources` block:
# nginx, databases, redis, rabbitmq, txs, cfg, cgw, events, ui
# (e.g. `redis: { resources: { requests: ..., limits: ... } }`).
resources:
  requests:
    cpu: 100m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 1Gi

# Resources for the copy-staticfiles initContainer used by txs-web and cfg-web.
initResources:
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
    ephemeral-storage: 256Mi

# Resources for the nginx static-files sidecar in txs-web/cfg-web pods.
staticNginxResources:
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
    ephemeral-storage: 256Mi

# Node selector and affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Health check configurations
healthCheck:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 30
  successThreshold: 1
  failureThreshold: 3

# NetworkPolicy permits all ingress/egress by default. Operators should
# tighten these rules per environment.
networkPolicy:
  enabled: true
  ingress:
    - {}
  egress:
    - {}

# PodDisruptionBudget applied per workload-component selector.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

# Credentials (these should be overridden in production)
credentials:
  postgres:
    user: postgres
    password: postgres
    database: postgres
  django:
    secretKey: Very-secure-secret-string
    superuser:
      username: root
      password: admin
      email: test@example.com
  cfg:
    secretKey: insecure_key_for_dev
  cgw:
    authToken: your_privileged_endpoints_token
    fingerprintEncryptionKey: ""
  jwt:
    issuer: ""
    secret: ""
  events:
    adminEmail: admin@safe
    adminPassword: password
