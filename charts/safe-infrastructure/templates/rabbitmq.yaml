{{- range $rabbitmq := list "txs" "general" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safe-infrastructure.fullname" $ }}-{{ $rabbitmq }}-rabbitmq
  labels:
    {{- include "safe-infrastructure.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $rabbitmq }}-rabbitmq
  annotations:
    # The official rabbitmq image runs as uid/gid 999 and cannot be raised
    # above 10000 without rebuilding the image.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "safe-infrastructure.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $rabbitmq }}-rabbitmq
  template:
    metadata:
      labels:
        {{- include "safe-infrastructure.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $rabbitmq }}-rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: "{{ $.Values.rabbitmq.image.repository }}:{{ $.Values.rabbitmq.image.tag }}"
        imagePullPolicy: {{ $.Values.rabbitmq.image.pullPolicy }}
        ports:
        - name: amqp
          containerPort: 5672
        - name: management
          containerPort: 15672
        readinessProbe:
          exec:
            command:
            - rabbitmq-diagnostics
            - -q
            - ping
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: {{ $.Values.healthCheck.timeoutSeconds }}
        livenessProbe:
          tcpSocket:
            port: amqp
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: {{ $.Values.healthCheck.timeoutSeconds }}
          failureThreshold: {{ $.Values.healthCheck.failureThreshold }}
        resources:
          {{- toYaml $.Values.resources | nindent 10 }}
{{- end }}
