{{- range $redis := list "txs" "cgw" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safe-infrastructure.fullname" $ }}-{{ $redis }}-redis
  labels:
    {{- include "safe-infrastructure.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $redis }}-redis
  annotations:
    # The official redis image runs as uid/gid 999 and cannot be raised above
    # 10000 without rebuilding the image.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "safe-infrastructure.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $redis }}-redis
  template:
    metadata:
      labels:
        {{- include "safe-infrastructure.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $redis }}-redis
    spec:
      containers:
      - name: redis
        image: "{{ $.Values.redis.image.repository }}:{{ $.Values.redis.image.tag }}"
        imagePullPolicy: {{ $.Values.redis.image.pullPolicy }}
        ports:
        - name: redis
          containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: {{ $.Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ $.Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ $.Values.healthCheck.timeoutSeconds }}
        livenessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: {{ $.Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ $.Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ $.Values.healthCheck.timeoutSeconds }}
        resources:
          {{- toYaml (default $.Values.resources $.Values.redis.resources) | nindent 10 }}
{{- end }}
