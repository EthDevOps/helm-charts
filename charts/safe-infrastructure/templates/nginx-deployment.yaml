apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safe-infrastructure.fullname" . }}-nginx
  labels:
    {{- include "safe-infrastructure.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
  annotations:
    # The official nginx:alpine image runs the master process as uid 0 to
    # bind privileged ports and cannot be raised above 10000 without
    # rebuilding the image.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "safe-infrastructure.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        {{- include "safe-infrastructure.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nginx
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
        imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: nginx-shared-txs
          mountPath: /nginx-txs
        - name: nginx-shared-cfg
          mountPath: /nginx-cfg
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: nginx-config
        configMap:
          name: {{ include "safe-infrastructure.fullname" . }}-nginx-config
      - name: nginx-shared-txs
        emptyDir: {}
      - name: nginx-shared-cfg
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "safe-infrastructure.fullname" . }}-nginx-config
data:
  nginx.conf: |
    worker_processes 1;

    events {
      worker_connections 2000; # increase if you have lots of clients
      accept_mutex off; # set to 'on' if nginx worker_processes > 1
      use epoll; # Enable epoll for Linux 2.6+
      # 'use kqueue;' to enable for FreeBSD, OSX
    }
    http {
    upstream txs {
        server {{ include "safe-infrastructure.fullname" . }}-txs-web:8888;
    }
    upstream txs-static {
        server {{ include "safe-infrastructure.fullname" . }}-txs-web:80;
    }
    upstream cfg {
        server {{ include "safe-infrastructure.fullname" . }}-cfg-web:8001;
    }
    upstream cfg-static {
        server {{ include "safe-infrastructure.fullname" . }}-cfg-web:80;
    }
    upstream cgw {
        server {{ include "safe-infrastructure.fullname" . }}-cgw-web:3000;
    }
    upstream events {
        server {{ include "safe-infrastructure.fullname" . }}-events-web:3000;
    }
    upstream ui {
        server {{ include "safe-infrastructure.fullname" . }}-ui:8080;
    }
    server {
        listen 8000;

        location /txs/static/ {
            proxy_pass http://txs-static/;
        }
        location /txs/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://txs/;
        }
        location /cfg/static/ {
            proxy_pass http://cfg-static/;
        }
        location /cfg/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://cfg/;
        }
        location /cgw/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://cgw/;
        }
        location /events/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://events/;
        }
        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://ui/;
        }
    }
    }
