apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "safe-infrastructure.fullname" . }}-cfg-web
  labels:
    {{- include "safe-infrastructure.labels" . | nindent 4 }}
    app.kubernetes.io/component: cfg-web
  annotations:
    # TODO: The Safe config-service image is pulled as `:latest` by default.
    # Operators should pin `images.cfgVersion` in their overrides. The check
    # is suppressed until the chart can default to a fixed tag.
    kube-score/ignore: container-image-tag,container-security-context-user-group-id
spec:
  replicas: {{ .Values.cfg.replicas }}
  selector:
    matchLabels:
      {{- include "safe-infrastructure.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cfg-web
  template:
    metadata:
      labels:
        {{- include "safe-infrastructure.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cfg-web
    spec:
      initContainers:
      - name: copy-staticfiles
        image: {{ .Values.cfg.image }}:{{ .Values.images.cfgVersion }}
        imagePullPolicy: {{ .Values.cfg.pullPolicy }}
        command: ["sh", "-c", "cp -r /app/staticfiles/* /shared-static/"]
        volumeMounts:
        - name: staticfiles-volume
          mountPath: /shared-static
        resources:
          {{- toYaml .Values.initResources | nindent 10 }}
      containers:
      - name: cfg-web
        image: {{ .Values.cfg.image }}:{{ .Values.images.cfgVersion }}
        imagePullPolicy: {{ .Values.cfg.pullPolicy }}
        ports:
        - name: http
          containerPort: 8001
        env:
        - name: CSRF_COOKIE_NAME
          value: "csrf_cfg"
        # Without this the config-service gunicorn defaults to
        # cpu_count() * 2 workers, sized by the node, not the pod.
        - name: WEB_CONCURRENCY
          value: {{ .Values.cfg.webConcurrency | quote }}
        - name: PYTHONDONTWRITEBYTECODE
          value: {{ .Values.cfg.env.pythonDontWriteBytecode | quote }}
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: cfg-secret-key
        - name: DEBUG
          value: {{ .Values.cfg.env.debug | quote }}
        - name: ROOT_LOG_LEVEL
          value: {{ .Values.cfg.env.rootLogLevel | quote }}
        - name: DJANGO_ALLOWED_HOSTS
          value: {{ .Values.cfg.env.djangoAllowedHosts | quote }}
        - name: GUNICORN_BIND_PORT
          value: {{ .Values.cfg.env.gunicornBindPort | quote }}
        - name: DOCKER_NGINX_VOLUME_ROOT
          value: {{ .Values.cfg.env.dockerNginxVolumeRoot | quote }}
        - name: GUNICORN_BIND_SOCKET
          value: "unix:{{ .Values.cfg.env.dockerNginxVolumeRoot }}/gunicorn.socket"
        - name: NGINX_ENVSUBST_OUTPUT_DIR
          value: {{ .Values.cfg.env.nginxEnvsubstOutputDir | quote }}
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: postgres-password
        - name: POSTGRES_NAME
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: postgres-database
        - name: POSTGRES_HOST
          value: "{{ include "safe-infrastructure.fullname" . }}-cfg-db"
        - name: POSTGRES_PORT
          value: "5432"
        - name: DOCKER_WEB_VOLUME
          value: {{ .Values.cfg.env.dockerWebVolume | quote }}
        - name: GUNICORN_WEB_RELOAD
          value: {{ .Values.cfg.env.gunicornWebReload | quote }}
        - name: DJANGO_SUPERUSER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: django-superuser-password
        - name: DJANGO_SUPERUSER_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: django-superuser-username
        - name: DJANGO_SUPERUSER_EMAIL
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: django-superuser-email
        - name: DJANGO_OTP_ADMIN
          value: {{ .Values.cfg.env.djangoOtpAdmin | quote }}
        - name: DEFAULT_FILE_STORAGE
          value: {{ .Values.cfg.env.defaultFileStorage | quote }}
        - name: FORCE_SCRIPT_NAME
          value: "{{ .Values.baseUrl }}/cfg"
        - name: CGW_URL
          value: "http://{{ include "safe-infrastructure.fullname" . }}-cgw-web:3000"
        - name: CGW_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "safe-infrastructure.fullname" . }}-credentials
              key: cgw-auth-token
        - name: CSRF_TRUSTED_ORIGINS
          value: {{ .Values.cfg.env.csrfTrustedOrigins | quote }}
        - name: MEDIA_URL
          value: {{ .Values.cfg.env.mediaUrl | quote }}
        volumeMounts:
        - name: nginx-shared-cfg
          mountPath: /nginx
        readinessProbe:
          httpGet:
            path: /cfg/api/v1/about/
            port: http
          initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthCheck.periodSeconds }}
          timeoutSeconds: {{ .Values.healthCheck.timeoutSeconds }}
        resources:
          {{- toYaml (default .Values.resources .Values.cfg.resources) | nindent 10 }}
      - name: nginx-staticfiles
        image: "{{ .Values.staticNginx.image.repository }}:{{ .Values.staticNginx.image.tag }}"
        imagePullPolicy: {{ .Values.staticNginx.image.pullPolicy }}
        ports:
        - name: static
          containerPort: 80
        volumeMounts:
        - name: staticfiles-volume
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-static-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          {{- toYaml .Values.staticNginxResources | nindent 10 }}
      volumes:
      - name: nginx-shared-cfg
        emptyDir: {}
      - name: staticfiles-volume
        emptyDir: {}
      - name: nginx-static-config
        configMap:
          name: {{ include "safe-infrastructure.fullname" . }}-nginx-cfg-static-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "safe-infrastructure.fullname" . }}-nginx-cfg-static-config
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }
    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      sendfile on;
      keepalive_timeout 65;

      server {
        listen 80;
        root /usr/share/nginx/html;

        location / {
          try_files $uri $uri/ =404;
        }
      }
    }
