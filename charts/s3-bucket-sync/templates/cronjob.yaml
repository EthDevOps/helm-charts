apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-job
  labels:
    app: {{ .Release.Name }}
    app.kubernetes.io/component: sync
  annotations:
    # The upstream s3-sync-docker image (ethdevops/s3-sync-docker) runs as
    # root because rclone/mc need to write config files in the runtime path.
    # Container-level uid/gid cannot be forced > 10000 without rebuilding
    # the image, so this check is suppressed.
    kube-score/ignore: container-security-context-user-group-id
spec:
  schedule: "{{ .Values.backupSchedule }}"
  timeZone: 'Etc/UTC'
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.cronjob.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}
            app.kubernetes.io/component: sync
        spec:
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- if or .Values.useCustomConfig .Values.filters.enabled }}
          volumes:
            {{- if .Values.useCustomConfig }}
            - name: custom-config-vol
              configMap:
                name: {{ .Values.customConfig }}
            {{- end }}
            {{- if .Values.filters.enabled }}
            - name: rclone-filters
              configMap:
                name: {{ .Release.Name }}-rclone-filters
            {{- end }}
          {{- end }}
          containers:
          - name: {{ .Release.Name }}-minio-mirror
            image: docker.ethquokkaops.io/ethquokkaops/ethdevops/s3-sync-docker:{{ .Values.imageTag }}
            imagePullPolicy: {{ .Values.imagePullPolicy }}
            securityContext:
              {{- toYaml .Values.containerSecurityContext | nindent 14 }}
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
            {{- if or .Values.useCustomConfig .Values.filters.enabled }}
            volumeMounts:
            {{- if .Values.useCustomConfig }}
            - name: custom-config-vol
              mountPath: "/opt/config.tmpl"
              subPath: "config.tmpl"
            {{- end }}
            {{- if .Values.filters.enabled }}
            - name: rclone-filters
              mountPath: /etc/rclone-filters
            {{- end }}
            {{- end }}
            envFrom:
              - configMapRef:
                  name: {{ .Release.Name }}-sync-config
            {{- if and (not .Values.existingSourceSecret) (not .Values.existingDestinationSecret) }}
              - secretRef:
                  name: {{ .Release.Name }}-sync-credentials
            {{- end }}
            env:
            {{- if or .Values.extraSyncArgs .Values.filters.enabled }}
              - name: EXTRA_SYNC_ARGS
                value: "{{- if .Values.extraSyncArgs }}{{ .Values.extraSyncArgs }}{{ end }}{{- if and .Values.extraSyncArgs .Values.filters.enabled }} {{ end }}{{- if .Values.filters.enabled }}--filter-from=/etc/rclone-filters/filters.txt{{- end }}"
            {{- end }}
            {{- if .Values.existingSourceSecret }}
              - name: SOURCE_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.existingSourceSecret }}
                    key: {{ .Values.sourceSecretKeys.accessKey }}
              - name: SOURCE_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.existingSourceSecret }}
                    key: {{ .Values.sourceSecretKeys.secretKey }}
            {{- end }}
            {{- if .Values.existingDestinationSecret }}
              - name: DESTINATION_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.existingDestinationSecret }}
                    key: {{ .Values.destinationSecretKeys.accessKey }}
              - name: DESTINATION_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: {{ .Values.existingDestinationSecret }}
                    key: {{ .Values.destinationSecretKeys.secretKey }}
            {{- end }}
            {{- if and (not .Values.existingSourceSecret) .Values.existingDestinationSecret }}
              - name: SOURCE_ACCESS_KEY
                value: "{{ .Values.sourceAccessKey }}"
              - name: SOURCE_SECRET_KEY
                value: "{{ .Values.sourceSecretKey }}"
            {{- end }}
            {{- if and .Values.existingSourceSecret (not .Values.existingDestinationSecret) }}
              - name: DESTINATION_ACCESS_KEY
                value: "{{ .Values.destinationAccessKey }}"
              - name: DESTINATION_SECRET_KEY
                value: "{{ .Values.destinationSecretKey }}"
            {{- end }}
