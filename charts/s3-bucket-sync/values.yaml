# Source
sourceEndpoint: "http://localhost:9000"
sourceBucket: "my-bucket"
sourceAccessKey: "my-access-key"
sourceSecretKey: "my-secret-key"

# Source secret configuration
# If existingSourceSecret is specified, sourceAccessKey and sourceSecretKey will be ignored
existingSourceSecret: ""
sourceSecretKeys:
  accessKey: "SOURCE_ACCESS_KEY"
  secretKey: "SOURCE_SECRET_KEY"

# Destination
destinationEndpoint: "http://localhost:9000"
destinationBucket: "my-bucket"
destinationTempBucket: "my-bucket-tmp"
destinationAccessKey: "my-access-key"
destinationSecretKey: "my-secret-key"

# Destination secret configuration
# If existingDestinationSecret is specified, destinationAccessKey and destinationSecretKey will be ignored
existingDestinationSecret: ""
destinationSecretKeys:
  accessKey: "DESTINATION_ACCESS_KEY"
  secretKey: "DESTINATION_SECRET_KEY"

useAtomic: false
healthcheckUrl: "http://localhost"
backupSchedule: "30 * * * *"
minioExtraArgs: ""
imageTag: "v0.12.0"
imagePullPolicy: Always
enableDebug: "0"
enableOverwrite: "0"
bandwidthLimit: "100M"
useCustomConfig: true
customConfig: test.config

# Filter configuration
# When enabled, creates a ConfigMap with filter rules and mounts it
filters:
  enabled: false
  # Filter rules for rclone (one rule per line)
  # Example:
  #   + **/23861500/**
  #   - *
  rules: ""

# CronJob scheduling controls
cronjob:
  # Cancel scheduled jobs that can't start within this window (seconds)
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

# Resource requests and limits for the sync container
resources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 2Gi

# Pod-level security context. The s3-sync-docker image runs as root because
# rclone/mc need to manage on-disk config files; container-level uid/gid is
# left to the image. See kube-score/ignore on the CronJob.
podSecurityContext: {}

# Container-level security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# NetworkPolicy configuration
networkPolicy:
  # Enable NetworkPolicy for the sync job
  enabled: true
  # Ingress rules (empty by default — sync job does not expose ports)
  ingress: []
  # Egress rules (allow all by default; restrict per-environment if needed)
  egress:
    - {}
