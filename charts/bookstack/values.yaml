replicaCount: 1
appDomain: bookstack.example.com

image:
  repository: lscr.io/linuxserver/bookstack
  tag: version-v25.12.3
  pullPolicy: Always

bookstack:
  puid: 1000
  pgid: 1000
  timezone: Etc/UTC
  # APP_KEY is required. Generate one with:
  # docker run -it --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey
  appKey: ""
  # Use an existing secret for sensitive values (APP_KEY)
  existingSecret:
    # Name of an existing secret containing the APP_KEY
    name: ""
    appKeyKey: APP_KEY
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 1Gi

mariadb:
  enabled: true
  image:
    repository: lscr.io/linuxserver/mariadb
    tag: "11.4.8"
    pullPolicy: Always
  puid: 1000
  pgid: 1000
  timezone: Etc/UTC
  database: bookstack
  username: bookstack
  # Passwords - set these or use existingSecret
  password: ""
  rootPassword: ""
  existingSecret:
    # Name of an existing secret containing DB credentials
    name: ""
    passwordKey: DB_PASSWORD
    rootPasswordKey: MYSQL_ROOT_PASSWORD
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi

# External database configuration (used when mariadb.enabled is false)
externalDatabase:
  host: ""
  port: 3306
  database: bookstack
  username: bookstack
  existingSecret:
    name: ""
    passwordKey: DB_PASSWORD

oidc:
  enabled: false
  autoInitiate: false
  name: SSO
  displayNameClaims: name
  issuer: ""
  issuerDiscover: true
  endSessionEndpoint: false
  fetchAvatar: false
  # Only needed if issuerDiscover is false
  publicKey: ""
  authEndpoint: ""
  tokenEndpoint: ""
  userinfoEndpoint: ""
  existingSecret:
    name: ""
    clientIdKey: OIDC_CLIENT_ID
    clientSecretKey: OIDC_CLIENT_SECRET

persistence:
  size: 2Gi

ingress:
  enabled: false
  annotations: {}
  tls:
    secretName: bookstack-tls

service:
  type: ClusterIP
  annotations: {}

# NetworkPolicy guarding ingress and egress for both bookstack and mariadb pods.
# Defaults are permissive: anyone in the cluster can hit bookstack on port 80
# and bookstack can reach mariadb on 3306. Egress is unrestricted so app can
# call DNS, OIDC issuer, package mirrors, etc. Tighten per environment.
networkPolicy:
  enabled: true
  ingress:
    - {}
  egress:
    - {}

# PodDisruptionBudget. maxUnavailable: 1 keeps a single-replica chart drainable
# while still letting the cluster signal voluntary disruptions.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
