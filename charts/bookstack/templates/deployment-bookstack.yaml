apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-bookstack
  annotations:
    # linuxserver/bookstack starts as root via s6-overlay so it can chown the
    # /config volume and then drops privileges to the configured PUID/PGID
    # (default 1000/1000 — both below kube-score's 10000 threshold). The image
    # cannot be reconfigured to run as a high UID without rebuilding upstream.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-bookstack
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-bookstack
    spec:
      containers:
        - name: bookstack
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PUID
              value: {{ .Values.bookstack.puid | quote }}
            - name: PGID
              value: {{ .Values.bookstack.pgid | quote }}
            - name: TZ
              value: {{ .Values.bookstack.timezone | quote }}
            - name: APP_URL
              value: "https://{{ .Values.appDomain }}"
            {{- if .Values.bookstack.existingSecret.name }}
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bookstack.existingSecret.name }}
                  key: {{ .Values.bookstack.existingSecret.appKeyKey }}
            {{- else }}
            - name: APP_KEY
              value: {{ .Values.bookstack.appKey | quote }}
            {{- end }}
            {{- if .Values.mariadb.enabled }}
            - name: DB_HOST
              value: {{ .Release.Name }}-bookstack-mariadb
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: {{ .Values.mariadb.database | quote }}
            - name: DB_USERNAME
              value: {{ .Values.mariadb.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.mariadb.existingSecret.name }}
                  name: {{ .Values.mariadb.existingSecret.name }}
                  key: {{ .Values.mariadb.existingSecret.passwordKey }}
                  {{- else }}
                  name: {{ .Release.Name }}-bookstack-db
                  key: DB_PASSWORD
                  {{- end }}
            {{- else }}
            - name: DB_HOST
              value: {{ .Values.externalDatabase.host | quote }}
            - name: DB_PORT
              value: {{ .Values.externalDatabase.port | quote }}
            - name: DB_DATABASE
              value: {{ .Values.externalDatabase.database | quote }}
            - name: DB_USERNAME
              value: {{ .Values.externalDatabase.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret.name }}
                  key: {{ .Values.externalDatabase.existingSecret.passwordKey }}
            {{- end }}
          {{- if .Values.oidc.enabled }}
            - name: AUTH_METHOD
              value: "oidc"
            - name: AUTH_AUTO_INITIATE
              value: {{ .Values.oidc.autoInitiate | quote }}
            - name: OIDC_NAME
              value: {{ .Values.oidc.name | quote }}
            - name: OIDC_DISPLAY_NAME_CLAIMS
              value: {{ .Values.oidc.displayNameClaims | quote }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.existingSecret.name }}
                  key: {{ .Values.oidc.existingSecret.clientIdKey }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.existingSecret.name }}
                  key: {{ .Values.oidc.existingSecret.clientSecretKey }}
            - name: OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: OIDC_END_SESSION_ENDPOINT
              value: {{ .Values.oidc.endSessionEndpoint | quote }}
            - name: OIDC_FETCH_AVATAR
              value: {{ .Values.oidc.fetchAvatar | quote }}
            - name: OIDC_ISSUER_DISCOVER
              value: {{ .Values.oidc.issuerDiscover | quote }}
            {{- if not .Values.oidc.issuerDiscover }}
            - name: OIDC_PUBLIC_KEY
              value: {{ .Values.oidc.publicKey | quote }}
            - name: OIDC_AUTH_ENDPOINT
              value: {{ .Values.oidc.authEndpoint | quote }}
            - name: OIDC_TOKEN_ENDPOINT
              value: {{ .Values.oidc.tokenEndpoint | quote }}
            - name: OIDC_USERINFO_ENDPOINT
              value: {{ .Values.oidc.userinfoEndpoint | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.bookstack.resources | nindent 12 }}
          volumeMounts:
            - name: bookstack-storage
              mountPath: /config
      volumes:
        - name: bookstack-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-bookstack-pvc
