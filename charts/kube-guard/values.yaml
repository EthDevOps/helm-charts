# Default values for kube-guard


# Image configuration
image:
  repository: docker.ethquokkaops.io/ethquokkaops/ethdevops/kube-guard
  pullPolicy: IfNotPresent
  tag: "latest"

# Service account
serviceAccount:
  create: true
  name: kube-guard

# Configuration
config:
  # Mattermost configuration
  mattermost:
    # Mattermost webhook URL - REQUIRED
    webhookUrl: "https://your-mattermost.example.com/hooks/your-webhook-id"
    # Mattermost channel name (without #)
    channel: "alerts"

  # Cluster name shown in alert messages
  clusterName: "my-cluster"

  # Namespaces to monitor. Use ["*"] to monitor all namespaces.
  monitoredNamespaces:
    - "*"

  # Users to exclude from notifications (e.g. service accounts, CI bots)
  # Example: ["system:serviceaccount:kube-system:replicaset-controller", "ci-bot"]
  ignoredUsers: []

  # Notification settings - toggle individual detection types
  notifications:
    # kubectl exec into pods
    shellAccess: true
    # kubectl port-forward to pods
    portForward: true
    # Pod creation with PVC mounts (detects data exfiltration via ad-hoc pods)
    pvcMount: true
    # Privileged container creation
    privilegedPod: true
    # Pods with hostPath, hostNetwork, hostPID, or hostIPC
    hostAccess: true
    # ClusterRole/ClusterRoleBinding/Role/RoleBinding changes
    rbacChange: true
    # Namespace deletion
    namespaceDelete: true

# Deployment configuration
deployment:
  name: kube-guard
  replicaCount: 2

  # Container port
  containerPort: 8443

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000

  # Probes
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8443
      scheme: HTTPS
    initialDelaySeconds: 10
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8443
      scheme: HTTPS
    initialDelaySeconds: 5
    periodSeconds: 5

# Service configuration
service:
  name: kube-guard-webhook
  type: ClusterIP
  port: 443
  targetPort: 8443

# Webhook configuration
webhook:
  # Webhook name
  name: kube-guard.example.com
  # Failure policy: Ignore or Fail
  failurePolicy: Ignore

  # TLS configuration
  tls:
    # If false, certificates will be generated automatically
    provided: false
    # If provided is true, specify the secret name containing tls.crt and tls.key
    secretName: kube-guard-tls

# RBAC
rbac:
  create: true
