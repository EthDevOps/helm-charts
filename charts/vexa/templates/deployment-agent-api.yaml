{{- if .Values.agentApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "agent-api") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agentApi.replicaCount }}
  {{- include "vexa.deploymentStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent-api
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent-api
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent-api
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.agentApi.image.repository }}:{{ .Values.global.imageTag | default .Values.agentApi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8100
          {{- with .Values.global.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: VEXA_AGENT_API_PORT
              value: "8100"
            - name: VEXA_RUNTIME_API_URL
              value: "http://{{ include "vexa.componentName" (list . "runtime") }}:{{ .Values.runtime.service.port }}"
            - name: VEXA_AGENT_API_SELF_URL
              value: "http://{{ include "vexa.componentName" (list . "agent-api") }}:{{ .Values.agentApi.service.port }}"
            - name: VEXA_GATEWAY_URL
              value: "http://{{ include "vexa.componentName" (list . "gateway") }}:{{ .Values.gateway.service.port }}"
            - name: VEXA_AGENT_PROFILE
              value: "agent"
            - name: VEXA_WORKSPACES_DIR
              value: "/workspaces"
            # The workspace store backing the runtime binds into spawned workers. On k8s the PVC name
            # is the contract; full worker mounting needs RWX storage (see README — follow-up).
            - name: VEXA_WORKSPACE_MOUNT_SOURCE
              value: {{ include "vexa.componentName" (list . "agent-workspaces") | quote }}
            # Three-tier mount stack (AMENDMENT 4): the platform-owned GLOBAL SYSTEM workspace (_global),
            # mounted READ-ONLY into every worker. Empty = no _global mount (mount-when-present); REF pins
            # it for safe rollout (empty = HEAD). Provisioning a real _global repo on k8s is a follow-up.
            - name: VEXA_GLOBAL_SYSTEM_WORKSPACE_PATH
              value: {{ .Values.agentApi.globalSystemWorkspacePath | default "" | quote }}
            - name: VEXA_GLOBAL_SYSTEM_WORKSPACE_REF
              value: {{ .Values.agentApi.globalSystemWorkspaceRef | default "" | quote }}
            - name: VEXA_REDIS_URL
              value: {{ include "vexa.redisUrl" . | quote }}
            - name: VEXA_DISPATCH_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: VEXA_DISPATCH_SIGNING_KEY
            - name: VEXA_BOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: VEXA_BOT_API_KEY
                  optional: true
            - name: VEXA_AGENT_DEFAULT_SUBJECT
              value: {{ .Values.agentApi.defaultSubject | default "u_live" | quote }}
            - name: VEXA_AGENT_MODEL
              value: {{ .Values.models.agentModel | default "" | quote }}
            - name: VEXA_MEETING_MODEL
              value: {{ .Values.models.meetingModel | default "" | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: ANTHROPIC_AUTH_TOKEN
                  optional: true
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: ANTHROPIC_BASE_URL
                  optional: true
            # claude CLI subscription OAuth — agent-api stamps this (with the ANTHROPIC_* trio
            # above) into every worker dispatch spec env, the only credential path for workers
            # spawned as Pods (dispatch.py MODEL_AUTH_ENV_ALLOWLIST). optional: a creds-less
            # deploy boots fine and fails at inference with the actionable auth error.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: CLAUDE_CODE_OAUTH_TOKEN
                  optional: true
            - name: ANTHROPIC_MODEL
              value: {{ .Values.models.anthropicModel | default "" | quote }}
            - name: ANTHROPIC_DEFAULT_OPUS_MODEL
              value: {{ .Values.models.anthropicOpusModel | default "" | quote }}
            - name: ANTHROPIC_DEFAULT_SONNET_MODEL
              value: {{ .Values.models.anthropicSonnetModel | default "" | quote }}
            - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
              value: {{ .Values.models.anthropicHaikuModel | default "" | quote }}
            - name: VEXA_LOG_LEVEL
              value: {{ .Values.agentApi.logLevel | default "info" | quote }}
            {{- with .Values.agentApi.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          # Liveness uses tcpSocket (not /health like readiness): TCP accept proves the
          # process is alive; dependency flaps in /health shouldn't trigger restarts.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.agentApi.resources | nindent 12 }}
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: {{ include "vexa.componentName" (list . "agent-workspaces") }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
