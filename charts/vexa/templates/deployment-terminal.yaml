{{- if .Values.terminal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "terminal") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.terminal.replicaCount }}
  {{- include "vexa.deploymentStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: terminal
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: terminal
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: terminal
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.terminal.image.repository }}:{{ .Values.global.imageTag | default .Values.terminal.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            # Gateway base URL — HTTP scheme: the REST proxy ([...path]/route.ts) fetches it as http,
            # and server.mjs converts it to ws:// itself for the /ws upgrade. Setting ws:// here breaks
            # the REST proxy (fetch can't speak ws → 502).
            - name: GATEWAY_URL
              value: "http://{{ include "vexa.componentName" (list . "gateway") }}:{{ .Values.gateway.service.port }}"
            - name: AGENT_API_URL
              value: "http://{{ include "vexa.componentName" (list . "agent-api") }}:{{ .Values.agentApi.service.port }}"
            - name: VEXA_ADMIN_API_URL
              value: "http://{{ include "vexa.componentName" (list . "admin-api") }}:{{ .Values.adminApi.service.port }}"
            - name: VEXA_API_URL
              value: "http://{{ include "vexa.componentName" (list . "gateway") }}:{{ .Values.gateway.service.port }}"
            # Terminal-owned email login finds-or-creates a user + mints a token via admin-api.
            - name: VEXA_ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: ADMIN_API_TOKEN
            - name: VEXA_BOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: VEXA_BOT_API_KEY
                  optional: true
            # next-auth session signing secret.
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: NEXTAUTH_SECRET
            {{- if .Values.terminal.publicUrl }}
            # External origin (set when ingress/LB fronts the terminal) — cookie security + OAuth callbacks.
            - name: NEXTAUTH_URL
              value: {{ .Values.terminal.publicUrl | quote }}
            - name: TERMINAL_URL
              value: {{ .Values.terminal.publicUrl | quote }}
            {{- end }}
            {{- with .Values.terminal.oauth.google }}
            {{- if or .existingSecretName .clientId }}
            # Google OAuth login (NextAuth self-gates: the button shows only when BOTH id+secret
            # resolve). Redirect URI to register: {publicUrl}/api/auth/callback/google
            {{- if .existingSecretName }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecretName | quote }}
                  key: {{ .clientIdKey | quote }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecretName | quote }}
                  key: {{ .clientSecretKey | quote }}
            {{- else }}
            - name: GOOGLE_CLIENT_ID
              value: {{ .clientId | quote }}
            - name: GOOGLE_CLIENT_SECRET
              value: {{ .clientSecret | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- with .Values.terminal.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          # Liveness uses tcpSocket (readiness renders /): a served page gates traffic,
          # TCP accept is enough to prove the Next.js server process isn't wedged.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.terminal.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
