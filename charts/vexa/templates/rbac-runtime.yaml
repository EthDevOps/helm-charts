{{- if and .Values.runtime.enabled (eq .Values.runtime.backend "k8s") }}
# Pod-spawn RBAC for the runtime's K8sBackend (kubectl run/get/delete of bot + agent-worker Pods).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vexa.componentName" (list . "runtime") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vexa.componentName" (list . "runtime") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vexa.componentName" (list . "runtime") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vexa.componentName" (list . "runtime") }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vexa.componentName" (list . "runtime") }}
    namespace: {{ .Release.Namespace }}
{{- end }}
