{{- if .Values.meetingApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "meeting-api") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.meetingApi.replicaCount }}
  {{- include "vexa.deploymentStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: meeting-api
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: meeting-api
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: meeting-api
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.meetingApi.image.repository }}:{{ .Values.global.imageTag | default .Values.meetingApi.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: {{ include "vexa.dbHostEffective" . | quote }}
            - name: DB_PORT
              value: {{ include "vexa.dbPortEffective" . | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.postgresCredentialsSecretName" . | quote }}
                  key: POSTGRES_PASSWORD
            - name: REDIS_URL
              value: {{ include "vexa.redisUrl" . | quote }}
            - name: RUNTIME_API_URL
              value: "http://{{ include "vexa.componentName" (list . "runtime") }}:{{ .Values.runtime.service.port }}"
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: INTERNAL_API_SECRET
            # MeetingToken is signed AND verified with the SAME admin secret admin-api holds.
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: ADMIN_API_TOKEN
            - name: TRANSCRIPTION_SERVICE_URL
              value: {{ .Values.meetingApi.transcriptionServiceUrl | default "" | quote }}
            - name: TRANSCRIPTION_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: TRANSCRIPTION_SERVICE_TOKEN
            {{- if .Values.minio.enabled }}
            - name: MINIO_ENDPOINT
              value: "{{ include "vexa.componentName" (list . "minio") }}:{{ .Values.minio.service.port }}"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            {{- end }}
            - name: MINIO_SECURE
              value: {{ .Values.meetingApi.minioSecure | default "false" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.meetingApi.logLevel | default "info" | quote }}
            {{- with .Values.meetingApi.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # Liveness uses tcpSocket (not /health like readiness): TCP accept proves the
          # process is alive; dependency flaps in /health shouldn't trigger restarts.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            {{- toYaml .Values.meetingApi.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
