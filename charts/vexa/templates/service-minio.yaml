{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vexa.componentName" (list . "minio") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  type: {{ .Values.minio.service.type }}
  ports:
    - name: api
      port: {{ .Values.minio.service.port }}
      targetPort: api
      {{- if and (eq .Values.minio.service.type "NodePort") .Values.minio.service.nodePort }}
      # v0.10.5.3 Pack D-3 follow-up (Option B): NodePort makes MinIO
      # browser-reachable for presigned-URL audio fetches. Fixed nodePort
      # so MINIO_PUBLIC_ENDPOINT can reference it deterministically.
      nodePort: {{ .Values.minio.service.nodePort }}
      {{- end }}
    - name: console
      port: 9001
      targetPort: console
  selector:
    {{- include "vexa.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
