{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vexa.componentName" (list . "gateway") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  {{- include "vexa.deploymentStrategy" . | nindent 2 }}
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      annotations:
        {{- toYaml .Values.global.podAnnotations | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.global.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          securityContext:
            {{- toYaml .Values.global.securityContext | nindent 12 }}
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.global.imageTag | default .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          {{- with .Values.global.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: ADMIN_API_URL
              value: "http://{{ include "vexa.componentName" (list . "admin-api") }}:{{ .Values.adminApi.service.port }}"
            - name: MEETING_API_URL
              value: "http://{{ include "vexa.componentName" (list . "meeting-api") }}:{{ .Values.meetingApi.service.port }}"
            # The agent control plane fronted under /api/* (P20 Stage 2). Default is http://agent-api:8100
            # (the compose service name); helm's service name differs, so set it explicitly.
            - name: AGENT_API_URL
              value: "http://{{ include "vexa.componentName" (list . "agent-api") }}:{{ .Values.agentApi.service.port }}"
            - name: REDIS_URL
              value: {{ include "vexa.redisUrl" . | quote }}
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vexa.adminTokenSecretName" . }}
                  key: INTERNAL_API_SECRET
            - name: LOG_LEVEL
              value: {{ .Values.gateway.logLevel | default "info" | quote }}
            # fastapi-guard edge layer (edge_guard.py): per-IP throttle + auto-ban at the edge.
            # ON by default with generous limits (owner ruling); opt out with
            # --set gateway.guard.enabled=false. guard.wsEnabled is the optional /ws hook (off,
            # opt-in): in-memory per-process — does NOT share ban/rate-limit state with the
            # Redis-backed HTTP layer, and under uvicorn --workers N>1 each worker keeps an
            # independent WS ban set.
            - name: GUARD_ENABLED
              value: {{ .Values.gateway.guard.enabled | quote }}
            - name: GUARD_WS_ENABLED
              value: {{ .Values.gateway.guard.wsEnabled | quote }}
            - name: GUARD_ENABLE_REDIS
              value: {{ .Values.gateway.guard.enableRedis | quote }}
            - name: GUARD_RATE_LIMIT_RPM
              value: {{ .Values.gateway.guard.rateLimitRpm | quote }}
            - name: GUARD_RATE_LIMIT_WINDOW
              value: {{ .Values.gateway.guard.rateLimitWindow | quote }}
            - name: GUARD_AUTO_BAN_THRESHOLD
              value: {{ .Values.gateway.guard.autoBanThreshold | quote }}
            - name: GUARD_AUTO_BAN_DURATION
              value: {{ .Values.gateway.guard.autoBanDuration | quote }}
            - name: GUARD_IP_WHITELIST
              value: {{ .Values.gateway.guard.ipWhitelist | quote }}
            - name: GUARD_IP_BLACKLIST
              value: {{ .Values.gateway.guard.ipBlacklist | quote }}
            - name: GUARD_TRUSTED_PROXIES
              value: {{ .Values.gateway.guard.trustedProxies | quote }}
            - name: GUARD_TRUST_X_FORWARDED_PROTO
              value: {{ .Values.gateway.guard.trustXForwardedProto | quote }}
            {{- with .Values.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Decouple slow first boots (cold image + dependency wait) from liveness — liveness only
          # starts once startup succeeds, so a slow boot never triggers a restart loop.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 40
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          # Liveness deliberately uses a different handler than readiness: /health gates
          # traffic; a plain TCP accept is enough to prove the process isn't wedged and
          # avoids restart storms when a dependency makes /health flap.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
