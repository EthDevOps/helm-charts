{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vexa.componentName" (list . "postgres") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "vexa.componentName" (list . "postgres") }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "vexa.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # v0.10.5 Pack I.s — stateful-pod anti-affinity (#272 iter-5).
      # See deployment-minio.yaml header for the full rationale. Symmetric
      # spread across postgres/redis/minio/tts-service so that on a 2+
      # node cluster they distribute and avoid Linode's 7-vol-per-instance
      # cap during chart-upgrade rolling restarts (which retains old PVs
      # under reclaimPolicy=Retain, briefly causing 8+ volumes/node).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values: [redis, minio, tts-service]
                topologyKey: kubernetes.io/hostname
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # idle_in_transaction_session_timeout=60s auto-kills orphaned
          # transactions (defense-in-depth against DB session leaks in meeting-api).
          args:
            - "-c"
            - "idle_in_transaction_session_timeout={{ .Values.postgres.idleInTransactionTimeoutMs | default 60000 }}"
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          envFrom:
            - secretRef:
                name: {{ .Values.postgres.credentialsSecretName | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -h localhost -p 5432 -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
          # Liveness uses tcpSocket (readiness keeps pg_isready): an accepting socket
          # proves the postmaster is alive; recovery/startup phases where pg_isready
          # says "not ready" must not restart the pod mid-WAL-replay.
          livenessProbe:
            tcpSocket:
              port: pg
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- if .Values.postgres.persistence.storageClassName }}
        annotations:
          volume.beta.kubernetes.io/storage-class: {{ .Values.postgres.persistence.storageClassName | quote }}
        {{- end }}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
        {{- if .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ .Values.postgres.persistence.storageClassName | quote }}
        {{- end }}
{{- end }}
