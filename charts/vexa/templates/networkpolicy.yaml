{{- if .Values.networkPolicy.enabled }}
# One release-wide policy: every pod this chart renders carries the shared
# selector labels, so a single podSelector covers all components (services,
# infra, hook Jobs). Defaults allow all ingress/egress — the point is an
# explicit, tightenable policy object per environment, not a default lockdown.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vexa.fullname" . }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vexa.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
