{{- if not .Values.secrets.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vexa.componentName" (list . "secrets") }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_API_TOKEN: {{ .Values.secrets.adminApiToken | quote }}
  INTERNAL_API_SECRET: {{ .Values.secrets.internalApiSecret | default "vexa-internal-secret" | quote }}
  {{- if .Values.secrets.transcriptionServiceToken }}
  TRANSCRIPTION_SERVICE_TOKEN: {{ .Values.secrets.transcriptionServiceToken | quote }}
  {{- end }}
  VEXA_DISPATCH_SIGNING_KEY: {{ .Values.secrets.dispatchSigningKey | default "dev-dispatch-signing-key" | quote }}
  NEXTAUTH_SECRET: {{ .Values.secrets.nextauthSecret | default "dev-nextauth-secret" | quote }}
  {{- if .Values.secrets.botApiKey }}
  VEXA_BOT_API_KEY: {{ .Values.secrets.botApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicAuthToken }}
  ANTHROPIC_AUTH_TOKEN: {{ .Values.secrets.anthropicAuthToken | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicBaseUrl }}
  ANTHROPIC_BASE_URL: {{ .Values.secrets.anthropicBaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.claudeCodeOauthToken }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.secrets.claudeCodeOauthToken | quote }}
  {{- end }}
{{- end }}
---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.postgres.credentialsSecretName | default "postgres-credentials" }}
  labels:
    {{- include "vexa.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.password | default "postgres" | quote }}
{{- end }}
