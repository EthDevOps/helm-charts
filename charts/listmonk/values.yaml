commonAnnotations: {}
podAnnotations: {}
podLabels: {}
extraInitContainers: {}

ingress:
  # -- annotations for the ingress
  annotations: {} # @schema additionalProperties: true
  # -- ingress class name
  className: ""
  # -- enable the ingress
  enabled: false
  # -- host for the ingress
  host: listmonk.local
  # -- tls configuration for the ingress
  tls: []

service:
  type: ClusterIP
  annotations: {}

# -- NetworkPolicy for both the listmonk Deployment and postgres StatefulSet pods
networkPolicy:
  # -- enable a permissive default NetworkPolicy so kube-score is satisfied
  enabled: true
  # -- ingress rules (default: allow all). Tighten per-environment.
  ingress:
    - {}
  # -- egress rules (default: allow all). Tighten per-environment.
  egress:
    - {}

# -- PodDisruptionBudget for the listmonk Deployment
podDisruptionBudget:
  enabled: true
  # -- prefer maxUnavailable so single-replica deployments aren't trapped
  maxUnavailable: 1
  minAvailable: ""

listmonk:
  # -- The listmonk image configuration
  image:
    # -- the listmonk image repository
    repository: listmonk/listmonk
    # -- the listmonk image tag
    tag: v5.1.0
    # -- the listmonk image pull policy
    pullPolicy: Always

  # -- the number of listmonk deployment replicas
  replicas: 1

  # -- resources for the listmonk deployment
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi

  # -- resources for the init containers (wait-for-postgres, check-db-tables, db-init)
  initResources:
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
      ephemeral-storage: 256Mi

  # -- Storage configuration for listmonk
  storage:
    uploadsSize: "5Gi"
    staticSize: "1Gi"

postgres:
  # -- the postgres database name
  database: listmonk
  # -- enable postgres
  enabled: true
  # -- when not enabled, the external postgres service hostname is required
  hostname: ""
  # -- existing secret name containing postgres password (if set, password field is ignored and no secret is created)
  existingSecret: ""
  # -- key in existing secret containing the password (defaults to postgres-password)
  secretKey: ""
  # -- the postgres password (ignored if existingSecret is set)
  password: "listmonk"
  # -- the postgres username
  user: "listmonk"
  # -- the postgres image configuration
  image:
    # -- the postgres image repository
    repository: postgres
    # -- the postgres image tag
    tag: 16-alpine
    # -- the postgres image pull policy
    pullPolicy: Always
  # -- resources configuration for the postgres statefulset
  resources: # @schema $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/v1.31.6/resourcerequirements.json ; skipProperties: true
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  # -- storage configuration for postgres
  storage:
    size: "10Gi"
