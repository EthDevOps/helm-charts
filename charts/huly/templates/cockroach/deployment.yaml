{{- if .Values.cockroach.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockroach
  labels:
    {{- include "huly.labels" . | nindent 4 }}
    app: cockroach
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cockroach
  template:
    metadata:
      labels:
        {{- include "huly.labels" . | nindent 8 }}
        app: cockroach
    spec:
      {{- include "huly.scheduling" . | nindent 6 }}
      containers:
        - name: cockroach
          image: {{ .Values.cockroach.image }}
          args:
            - start-single-node
            - --insecure
          ports:
            - name: grpc
              containerPort: 26257
            - name: http
              containerPort: 8080
          # Upstream cockroachdb/cockroach in --insecure mode ignores
          # COCKROACH_USER/PASSWORD/DATABASE; only the built-in `root` user
          # and defaultdb/postgres/system exist. No env block needed.
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /cockroach/cockroach-data
          {{- with .Values.cockroach.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cockroach-data
{{- end }}
