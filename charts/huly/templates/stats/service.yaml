apiVersion: v1
kind: Service
metadata:
  name: stats
  labels:
    {{- include "huly.componentLabels" (dict "component" "stats" "root" .) | nindent 4 }}
    app: stats
  {{- include "huly.serviceAnnotations" (dict "cfg" .Values.stats.service "root" .) | nindent 2 }}
spec:
  {{- include "huly.serviceSpec" (dict "cfg" .Values.stats.service "root" .) | nindent 2 }}
  selector:
    app: stats
  ports:
    - name: http
      port: 4900
      targetPort: 4900
      {{- include "huly.servicePortNodePort" .Values.stats.service | nindent 6 }}
