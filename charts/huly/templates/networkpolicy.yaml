{{- if .Values.networkPolicy.enabled }}
{{- /*
NetworkPolicy targeting every Huly pod via the chart-wide
`app.kubernetes.io/part-of: huly` label. Kube-score only checks that a
matching policy exists, so default ingress/egress rules are intentionally
permissive — operators are expected to tighten them per environment.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "huly.fullname" . }}
  labels:
    {{- include "huly.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: huly
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
