apiVersion: v1
kind: Service
metadata:
  name: account
  labels:
    {{- include "huly.componentLabels" (dict "component" "account" "root" .) | nindent 4 }}
    app: account
  {{- include "huly.serviceAnnotations" (dict "cfg" .Values.account.service "root" .) | nindent 2 }}
spec:
  {{- include "huly.serviceSpec" (dict "cfg" .Values.account.service "root" .) | nindent 2 }}
  selector:
    app: account
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      {{- include "huly.servicePortNodePort" .Values.account.service | nindent 6 }}
