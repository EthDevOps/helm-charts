apiVersion: v1
kind: Service
metadata:
  name: collaborator
  labels:
    {{- include "huly.componentLabels" (dict "component" "collaborator" "root" .) | nindent 4 }}
    app: collaborator
  {{- include "huly.serviceAnnotations" (dict "cfg" .Values.collaborator.service "root" .) | nindent 2 }}
spec:
  {{- include "huly.serviceSpec" (dict "cfg" .Values.collaborator.service "root" .) | nindent 2 }}
  selector:
    app: collaborator
  ports:
    - name: http
      port: 3078
      targetPort: 3078
      {{- include "huly.servicePortNodePort" .Values.collaborator.service | nindent 6 }}
