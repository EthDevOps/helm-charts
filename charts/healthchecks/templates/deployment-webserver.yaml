apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hc-web
  labels:
    app: {{ .Release.Name }}-hc-web
  annotations:
    # The upstream healthchecks/healthchecks image runs uwsgi as root inside
    # the container; there is no high-UID alternative without rebuilding the
    # image. Suppress the kube-score check rather than gut functionality.
    kube-score/ignore: container-security-context-user-group-id
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-hc-web
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-hc-web
    spec:
      containers:
      - name: web
        image: {{ .Values.web.image.repository }}:{{ .Values.imageTag }}
        imagePullPolicy: {{ .Values.web.image.pullPolicy }}
        envFrom:
          - configMapRef:
              name: {{ .Release.Name }}-hc-config
        env:
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-hc-secrets
                key: DB_PASSWORD
          - name: DISCORD_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-hc-secrets
                key: DISCORD_CLIENT_SECRET
          - name: EMAIL_HOST_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-hc-secrets
                key: EMAIL_HOST_PASSWORD
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-hc-secrets
                key: SECRET_KEY

        ports:
          - name: http
            containerPort: 8000
        # Uncomment the following lines to enable SMTP on port 2525
        #- name: smtp
        #  containerPort: 2525
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
        {{- with .Values.web.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
          - "bash"
          - "-c"
          - |
            while !</dev/tcp/{{ .Release.Name }}-hc-db/5432; do sleep 1; done;
            uwsgi /opt/healthchecks/docker/uwsgi.ini
