apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hc-db
  labels:
    app: {{ .Release.Name }}-hc-db
  annotations:
    # The official postgres image runs as the postgres user (uid 999), below
    # kube-score's 10000 threshold and not configurable without rebuilding the
    # image. Suppress the check rather than break the image's init logic.
    kube-score/ignore: container-security-context-user-group-id
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-hc-db
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-hc-db
    spec:
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-hc-db-data
      containers:
      - name: db
        image: {{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}
        imagePullPolicy: {{ .Values.db.image.pullPolicy }}
        env:
          - name: POSTGRES_DB
            value: {{ .Values.db.name }}
          - name: POSTGRES_USER
            value: {{ .Values.db.user }}
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}-hc-secrets
                key: DB_PASSWORD
        volumeMounts:
          - name: db-data
            mountPath: /var/lib/postgresql/data
            subPath: pg
        ports:
          - name: postgres
            containerPort: 5432
        {{- with .Values.db.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        readinessProbe:
          tcpSocket:
            port: postgres
          periodSeconds: 5
          initialDelaySeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-hc-db-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.persistence.size }}
