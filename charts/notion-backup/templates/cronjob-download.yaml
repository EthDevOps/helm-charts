apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-notion-download
  labels:
    app: {{ .Release.Name }}
  annotations:
    # The upstream notion-backup-tool image runs as root and does not expose
    # a configurable uid/gid; we'd need to rebuild it to satisfy
    # `container-security-context-user-group-id`.
    kube-score/ignore: container-security-context-user-group-id
spec:
  schedule: "{{ .Values.backupSchedule }}"
  timeZone: 'Etc/UTC'
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}
        spec:
          restartPolicy: Never
          containers:
            - name: notion-backup
              image: docker.ethquokkaops.io/ethquokkaops/ethdevops/notion-backup-tool:{{ .Values.imageTag }}
              imagePullPolicy: {{ .Values.imagePullPolicy }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: credential-cache
                  mountPath: /data/credentials
                - name: working-dir
                  mountPath: /data/working
                - name: pgp-key-vol
                  mountPath: /var/keys
                  readOnly: true
              env:
                - name: MODE
                  value: "download"

              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
                - secretRef:
                    name: {{ .Release.Name }}-secret
          nodeSelector:
            kubernetes.io/os: linux
          volumes:
            - name: credential-cache
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-cred-cache
            - name: working-dir
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-working
            - name: pgp-key-vol
              secret:
                secretName: {{ .Release.Name }}-pgp-key
