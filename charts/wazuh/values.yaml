reloader:
  enabled: false

cert-manager:
  enabled: false

nameOverride: null
fullnameOverride: null

# Utility init container image used by the manager initContainers (update-index,
# install-wodle-gworkspace). Pinned to avoid `latest` tag.
utilityImage:
  alpine: "alpine:3.20"
  busybox: "busybox:1.36"
  pullPolicy: Always

networkPolicy:
  enabled: true
  # Default ingress/egress are intentionally permissive so the chart works
  # out-of-the-box. Operators are expected to tighten them per environment.
  ingress:
    - {}
  egress:
    - {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

indexer:
  replicas: 3

  annotations: {}

  service:
    annotations: {}
    httpPort: 9200
    nodes: 9300
    metrics: 9600

  updateStrategy: RollingUpdate

  images:
    repository: wazuh/wazuh-indexer
    tag: "4.14.5"
    pullPolicy: Always
    imagePullSecrets:
      enabled: false
      secret: {}

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
      ephemeral-storage: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi
      ephemeral-storage: 1Gi

  initContainers:
    volumeMountHack:
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
          ephemeral-storage: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
          ephemeral-storage: 128Mi
    increaseTheVmMaxMapCount:
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
          ephemeral-storage: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
          ephemeral-storage: 128Mi

  config:
    opensearch: |-
      {{- include "wazuh.indexer.opensearchConfig" . | indent 2 -}}
    internalUsers: |-
      {{- include "wazuh.indexer.internalUsers" . | indent 2 -}}

  env:
    OPENSEARCH_JAVA_OPTS: "-Xms1g -Xmx1g -Dlog4j2.formatMsgNoLookups=true"
    CLUSTER_NAME: "wazuh"
    NETWORK_HOST: "0.0.0.0"
    DISABLE_INSTALL_DEMO_CONFIG: "true"

  plugins: []

  storageSize: 50Gi
  storageClass: null

  cred:
    existingSecret: ""
    username: "admin"
    password: "SecretPassword"

# Kibana for elasticsearch with Wazuh plugins pre-installed
dashboard:
  replicas: 1

  annotations: {}

  images:
    repository: wazuh/wazuh-dashboard
    tag: "4.14.5"
    pullPolicy: Always
    updateStrategy: OnDelete

  resources:
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
      ephemeral-storage: 256Mi

  # with this you will be able to access kibana on http port instead of https
  # if you use Ambassador edgestack this is necessary becasue
  # with `true` route will close unexpectedly
  # when accessing via ambassador external url
  enable_ssl: false

  service:
    annotations: {}
    httpPort: 5601
    type: ClusterIP

  cred:
    existingSecret: ""
    username: "kibanaserver"
    password: "kibanaserver"

  config: |
    {{- include "wazuh.dashboard.config" . | indent 2 -}}

  ingress:
    enabled: false
    tls: []
    # - secretName: wazuh-tls
    #   hosts:
    #     - wazuh.example.com
    annotations: {}
    host: "wazuh.example.com"

wazuh:
  syslog_enable: true
  key: "c98b62a9b6169ac5f67dae55ae4a9088"
  images:
    repository: wazuh/wazuh-manager
    tag: "4.14.5"
    pullPolicy: Always
    pullSecret: regcred

  extraOssConfig: ""

  googleWorkspace:
    existingSecret: ""

  env:
    FILEBEAT_SSL_VERIFICATION_MODE: full

  service:
    annotations: {}
    port: 1516

  apiCred:
    # 3 Options:
    # 1. Set existing secret name
    # 2. Set username and password manually
    # 3. Let secret be generated automatically (all empty)
    existingSecret: ""
    username: "wazuh-wui"
    # The password must have a length between 8 and 64 characters and contain at least one upper and lower case letter, a number, and a symbol(.*+?-).
    password: "MyS3cr37P450r.*-"
  authd:
    existingSecret: ""
    pass: "password"

  initContainer:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
        ephemeral-storage: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
        ephemeral-storage: 256Mi

  master:
    annotations: {}

    service:
      type: ClusterIP
      annotations: {}
      ports:
        registration: 1515
        api: 55000

    resources:
      limits:
        cpu: "2"
        memory: 1Gi
        ephemeral-storage: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 256Mi

    # If defined, storageClassName: <storageClass>
    # If set to "-", storageClassName: "", which disables dynamic provisioning
    # If undefined (the default) or set to null, no storageClassName spec is
    #   set, choosing the default provisioner.
    storageClass: null
    storageSize: 50Gi

    conf: |
      {{- include "wazuh.master.conf" . | indent 2 -}}
    # To be appended to the master.conf
    extraConf: ""

  worker:
    replicas: 2

    annotations: {}

    service:
      type: ClusterIP
      annotations: {}
      ports:
        agentEvents: 1514

    resources:
      limits:
        cpu: "2"
        memory: 1Gi
        ephemeral-storage: 1Gi
      requests:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 256Mi

    storageClass: null
    storageSize: 50Gi

    conf: |
      {{- include "wazuh.worker.conf" . | indent 2 -}}
    # To be appended to the worker.conf
    extraConf: ""
