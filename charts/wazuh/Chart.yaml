apiVersion: v2
name: wazuh
description: Wazuh is a free and open source security platform that unifies XDR and SIEM protection for endpoints and cloud workloads.
type: application
appVersion: 4.14.5
version: 0.2.0
home: https://wazuh.com/
sources:
  - https://github.com/EthDevOps/helm-charts
  - https://github.com/morgoved/wazuh-helm
maintainers:
  - name: EthDevOps
    url: https://github.com/EthDevOps
icon: https://github.com/morgoved/wazuh-helm/blob/main/charts/wazuh/images/icon.png
keywords:
  - security
  - information
  - threat
  - management
  - kubernetes
  - wazuh
  - opendistro
  - elasticsearch
dependencies:
  - name: reloader
    version: 1.2.1
    repository: https://stakater.github.io/stakater-charts
    condition: reloader.enabled
  - name: cert-manager
    version: 1.16.3
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
annotations:
  artifacthub.io/category: security
  artifacthub.io/changes: |
    - kind: changed
      description: "BREAKING: worker LB Service is now templated per-pod. The chart now emits N LoadBalancer Services (one per worker replica, pinned via statefulset.kubernetes.io/pod-name) instead of a single multi-pod Service. Consume the new ethquokkaops.io/balance-group + ethquokkaops.io/balance annotations (or their LB-controller equivalents) so an upstream LB sees a single backend with multiple sticky-hashed server lines. Required to keep agent-to-worker routing deterministic; Wazuh worker nodes do not share per-agent state across the cluster."
    - kind: added
      description: "Add support for cert-manager"
    - kind: changed
      description: "Refactor whole chart"
    - kind: changed
      description: "Bump wazuh-manager to 4.10.1"
  artifacthub.io/links: |
    - name: application source
      url: https://github.com/wazuh/wazuh
    - name: kustomize source
      url: https://github.com/wazuh/wazuh-kubernetes
  artifacthub.io/prerelease: "true"
  artifacthub.io/screenshots: |
    - title: Home Page
      url: https://github.com/morgoved/wazuh-helm/blob/main/charts/wazuh/images/dashboard.png
    - title: Agent Deployment
      url: https://github.com/morgoved/wazuh-helm/blob/main/charts/wazuh/images/agent-deploy.png
    - title: Threat Hunting
      url: https://github.com/morgoved/wazuh-helm/blob/main/charts/wazuh/images/threat-hunting.png
