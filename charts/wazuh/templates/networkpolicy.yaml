{{- if .Values.networkPolicy.enabled }}
{{- /*
One NetworkPolicy per component pod selector. Kube-score only checks that a
matching policy exists, so default ingress/egress rules are intentionally
permissive — operators are expected to tighten them per environment.
*/ -}}
{{- $fullname := include "wazuh.fullname" . -}}
{{- $components := list
  (dict "name" "indexer" "selector" (dict "app" (printf "%s-indexer" $fullname)))
  (dict "name" "dashboard" "selector" (dict "app" (printf "%s-dashboard" $fullname)))
  (dict "name" "manager-master" "selector" (dict "app" (printf "%s-manager" $fullname) "node-type" "master"))
  (dict "name" "manager-worker" "selector" (dict "app" (printf "%s-manager" $fullname) "node-type" "worker"))
-}}
{{- range $idx, $c := $components }}
{{- if $idx }}
---
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-{{ $c.name }}
  labels:
    app: {{ $fullname }}-{{ $c.name }}
spec:
  podSelector:
    matchLabels:
      {{- range $k, $v := $c.selector }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}
  policyTypes:
    - Ingress
    - Egress
  {{- with $.Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $.Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
