{{- if .Values.cephfs.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: csi-cephfs-secret
stringData:
  # cephfs dynamic provisioning reads adminID/adminKey (userID/userKey are
  # only used for statically pre-provisioned volumes)
  adminID: {{ .Values.cephfs.auth.user }}
  adminKey: {{ .Values.cephfs.auth.key }}
{{- end }}
