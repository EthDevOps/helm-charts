clusterId: 08b71cc9-5ef7-44f2-8040-4b2dd66c5111
pool: k8s
monitors:
  - 192.168.1.0:6789
  - 192.168.1.1:6789
  - 192.168.1.2:6789
auth:
  user: kubernetes
  key: some-key

# CephFS driver (RWX/shared-filesystem volumes) alongside the always-on rbd
# driver. Disabled by default — existing consumers see no change. Requires a
# CephFS filesystem + MDS on the cluster and a user with mds/mgr/cephfs-osd
# caps (keep it separate from the rbd user).
cephfs:
  enabled: false
  # name of the CephFS filesystem (ceph fs ls)
  fsName: cephfs
  # subvolume group the CSI driver provisions into. NOT auto-created —
  # pre-create it (ceph fs subvolumegroup create <fsName> <group>) or PVCs
  # stay Pending. Use one group per k8s cluster when several clusters share
  # a filesystem.
  subvolumeGroup: csi
  auth:
    user: cephfs-user
    key: some-key

# Default resource requests/limits applied to every container in the
# DaemonSet and provisioner Deployment. Tune per-environment as needed.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
    ephemeral-storage: 64Mi
  limits:
    cpu: "1"
    memory: 512Mi
    ephemeral-storage: 512Mi

networkPolicy:
  # NetworkPolicy targeting the ceph-csi pods. Defaults are permissive so
  # the chart works out-of-the-box; tighten ingress/egress per environment.
  enabled: true
  ingress:
    - {}
  egress:
    - {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
