replicaCount: 1

image:
  repository: docker.ethquokkaops.io/ethquokkaops/ethdevops/service-registry
  pullPolicy: Always
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: http
  annotations: {}

ingress:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 1Gi

# livenessProbe uses tcpSocket so it differs from readinessProbe handler-wise
# (kube-score pod-probes-identical compares handler shape, not just timings).
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

networkPolicy:
  enabled: true
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - {}

podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

secrets:
  auth:
    existingSecret: ""
    secretKeys:
      googleClientId: "google-client-id"
      googleClientSecret: "google-client-secret"
      authorizedUsers: "authorized-users"
      localAdminUsername: "local-admin-username"
      localAdminPassword: "local-admin-password"
  
  database:
    existingSecret: ""
    secretKeys:
      username: "username"
      password: "password"

config:
  allowLocalAdminBypass: true
  allowedHosts: "*"
  logging:
    logLevel:
      default: "Information"
      microsoftAspNetCore: "Warning"

postgresql:
  enabled: true
  image:
    tag: 16-alpine
    pullPolicy: Always
  auth:
    existingSecret: ""
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"
    username: "quokka"
    database: "quokka_service_registry"
  primary:
    persistence:
      enabled: true
      size: 8Gi
  # Headless service so the StatefulSet's serviceName resolves to a headless Service
  # (kube-score statefulset-has-servicename). The subchart's service template renders
  # clusterIP: None when this is set, satisfying the check.
  service:
    clusterIP: "None"
  # Resources for the postgresql container (kube-score container-resources +
  # container-ephemeral-storage-request-and-limit). The subchart only ships
  # requests by default; provide explicit limits.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi
  # Enable NetworkPolicy in the postgres subchart (kube-score pod-networkpolicy).
  networkPolicy:
    enabled: true
    allowedPods:
      - app.kubernetes.io/name: quokka-service-registry
  # Bump uid/gid above 10000 (kube-score container-security-context-user-group-id).
  # The official postgres:16-alpine entrypoint accepts arbitrary non-root uids
  # as long as PGDATA is writable; fsGroup matches so the PVC is group-writable.
  securityContext:
    runAsUser: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
  podSecurityContext:
    fsGroup: 10001
