apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deploy
  annotations:
    # Image runs `apt-get` at startup (no fixed user/group baked in); we leave
    # it as root rather than pre-baking a custom image just for kube-score.
    # The image tag is not pinned because the runtime base version is still
    # being decided — see TODO in values.yaml.
    kube-score/ignore: container-security-context-user-group-id,container-image-tag
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      volumes:
      - name: script
        configMap:
          name: {{ .Release.Name }}-config
          defaultMode: 0777
      containers:
      - command:
        - /bin/sh
        - /script/run.sh
        image: "{{ .Values.image.repository }}{{ if .Values.image.tag }}:{{ .Values.image.tag }}{{ end }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: RANCHER_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-api-token
              key: RANCHER_API_TOKEN
        name: script
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
          - mountPath: /script
            name: script
