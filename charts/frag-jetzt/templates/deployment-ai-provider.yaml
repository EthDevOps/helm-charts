{{- if .Values.aiProvider.enabled }}
{{- $aiPg := index .Subcharts "ai-postgresql" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai-provider
  labels:
    {{- include "frag-jetzt.labels" . | nindent 4 }}
  annotations:
    # The fragjetzt-ai-provider image runs uvicorn as root and the init
    # container uses the postgres client image which bakes in uid 1001 — neither
    # can be reconfigured to a high UID without rebuilding upstream.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ai-provider
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ai-provider
    spec:
      initContainers:
        - name: init-ai-db
          image: {{ (index .Values "ai-postgresql").image.registry | default "" }}{{ ternary "/" "" (not (empty ((index .Values "ai-postgresql").image.registry | default ""))) }}postgres:{{ (index .Values "ai-postgresql").image.tag }}
          imagePullPolicy: {{ (index .Values "ai-postgresql").image.pullPolicy | default "Always" }}
          command: ["/bin/bash", "/scripts/init-replication.sh"]
          volumeMounts:
            - name: init-script
              mountPath: /scripts
          resources:
            {{- toYaml .Values.aiProvider.initContainer.resources | nindent 12 }}
      containers:
        - name: ai-provider
          image: {{ .Values.aiProvider.image.repository }}:{{ .Values.aiProvider.image.tag }}
          imagePullPolicy: {{ .Values.aiProvider.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.aiProvider.port }}
          env:
            - name: ORIGINS
              value: {{ .Values.aiProvider.origins | default (include "frag-jetzt.serverRootUrl" .) | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "frag-jetzt.secretName" . }}
                  key: {{ .Values.auth.existingSecret.jwtSecretKey | default "jwt-secret" }}
            - name: SECRET_ALGORITHM
              value: {{ .Values.aiProvider.secretAlgorithm | quote }}
            - name: ROOT_PATH
              value: "/ai"
            - name: POSTGRES_HOST
              value: {{ include "postgresql.v1.primary.fullname" $aiPg | quote }}
            - name: POSTGRES_PORT
              value: {{ include "postgresql.v1.service.port" $aiPg | quote }}
            - name: POSTGRES_USER
              value: {{ include "postgresql.v1.username" $aiPg | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ (index .Values "ai-postgresql").auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ include "postgresql.v1.database" $aiPg | quote }}
            - name: CHROMA_HOST
              value: {{ .Release.Name }}-ai-chroma
            - name: CHROMA_PORT
              value: "8000"
            - name: CHROMA_SERVER_AUTH_CREDENTIALS
              value: {{ .Values.aiProvider.chroma.auth.token | quote }}
          readinessProbe:
            httpGet:
              path: /ai/docs
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.aiProvider.resources | nindent 12 }}
      volumes:
        - name: init-script
          configMap:
            name: {{ .Release.Name }}-ai-pg-init
            defaultMode: 0755
{{- end }}
