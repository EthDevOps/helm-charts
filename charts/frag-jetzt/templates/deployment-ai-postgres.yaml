{{- if .Values.aiProvider.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ai-postgres
  labels:
    {{- include "frag-jetzt.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ai-postgres
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ai-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.aiProvider.postgres.image.repository }}:{{ .Values.aiProvider.postgres.image.tag }}
          imagePullPolicy: {{ .Values.aiProvider.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.aiProvider.postgres.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.aiProvider.postgres.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.aiProvider.postgres.auth.database | quote }}
          volumeMounts:
            - name: ai-postgres-data
              mountPath: /var/lib/postgresql/data
          resources: {}
      volumes:
        - name: ai-postgres-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ai-postgres-pvc
{{- end }}
