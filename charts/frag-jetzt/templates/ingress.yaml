{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-frag-jetzt-ingress
  labels:
    {{- include "frag-jetzt.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.appDomain }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.appDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "frag-jetzt.frontend.fullname" . }}
                port:
                  number: 80
{{- end }}
