apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frag-jetzt.frontend.fullname" . }}
  labels:
    {{- include "frag-jetzt.labels" . | nindent 4 }}
  annotations:
    # The frag.jetzt frontend is a baked nginx image listening on port 80; the
    # nginx master must start as root to bind <1024 and to drop to the nginx
    # worker user. Can't be reconfigured to a high UID without rebuilding.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "frag-jetzt.frontend.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "frag-jetzt.frontend.fullname" . }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/configmap-nginx.yaml") . | sha256sum }}
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ .Release.Name }}-nginx-config
