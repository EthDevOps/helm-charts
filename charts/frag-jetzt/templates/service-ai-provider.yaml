{{- if .Values.aiProvider.dummy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: fragjetzt-ai-provider
  labels:
    {{- include "frag-jetzt.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: {{ .Release.Name }}-ai-provider
{{- end }}
