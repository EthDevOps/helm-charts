{{- include "glitchtip.validateValues" . -}}
{{- $name := include "glitchtip.fullname" . -}}
{{- $needsSecretKey := and (not .Values.glitchtip.secretKey) (not .Values.glitchtip.existingSecret) -}}
{{- if or .Values.valkey.enabled $needsSecretKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "glitchtip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- if .Values.valkey.enabled }}
  REDIS_URL: {{ include "glitchtip.valkey.url" . | b64enc | quote }}
  {{- end }}
  {{- if $needsSecretKey }}
  {{- /*
    Preserve an existing SECRET_KEY when upgrading; only generate a new one
    on first install. The Secret is annotated with `helm.sh/resource-policy: keep`
    so the random key remains stable across upgrades and re-installs.
  */ -}}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
  {{- if and $existing $existing.data (index $existing.data "SECRET_KEY") }}
  SECRET_KEY: {{ index $existing.data "SECRET_KEY" }}
  {{- else }}
  SECRET_KEY: {{ randAlphaNum 50 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
