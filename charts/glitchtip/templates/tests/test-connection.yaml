apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "glitchtip.fullname" . }}-test-connection"
  labels:
{{ include "glitchtip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:  ['-qO-', '{{ include "glitchtip.fullname" . }}-web:{{ .Values.web.service.port }}']
  restartPolicy: Never
