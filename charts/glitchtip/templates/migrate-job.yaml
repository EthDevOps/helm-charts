{{- if .Values.preInstall -}}
  {{- fail ".Values.preInstall was moved to .Values.migrationJob, update your values accordingly" -}}
{{- end -}}

{{- if .Values.migrationJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "glitchtip.fullname" . }}-migrate
  labels:
    {{- include "glitchtip.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "0"
    {{- if .Values.valkey.enabled }}
    checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    {{- end }}
    tag: "{{ .Values.image.tag }}"
spec:
  activeDeadlineSeconds: {{ default 900 .Values.migrationJob.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate-job
        {{- include "glitchtip.selectorLabels" . | nindent 8 }}
      {{- if .Values.migrationJob.podAnnotations }}
      annotations:
      {{- include "common.tplvalues.render" ( dict "value" .Values.migrationJob.podAnnotations "context" $ ) | nindent 8 }}
      {{- end }}
    spec:
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "glitchtip.serviceAccountName" . }}
      restartPolicy: Never
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: migrate-job
        securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        {{- if .Values.migrationJob.resources }}
        resources: {{ toYaml .Values.migrationJob.resources | nindent 12 }}
        {{- end }}
        command: {{ .Values.migrationJob.command | default (list "./manage.py" "migrate") | toJson }}
        env:
          - name: DEBUG
            value: "False"
          {{- include "glitchtip.shared.env" . | nindent 10 }}
          {{- include "glitchtip.database.env" (dict "root" . "component" .Values.migrationJob) | nindent 10 }}
          {{- include "glitchtip.valkey.env" . | nindent 10 }}
          {{- with .Values.extraEnvVars }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.migrationJob.extraEnvVars }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- if or .Values.extraEnvFrom .Values.migrationJob.extraEnvFrom }}
        envFrom:
          {{- with .Values.extraEnvFrom }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- with .Values.migrationJob.extraEnvFrom }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
