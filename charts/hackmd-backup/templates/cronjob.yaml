apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-hackmd-job
  labels:
    app: {{ .Release.Name }}
  annotations:
    # The upstream hackmd-backup-tool image runs as root and does not expose
    # a configurable uid/gid; we'd need to rebuild it to satisfy
    # `container-security-context-user-group-id`.
    kube-score/ignore: container-security-context-user-group-id
spec:
  schedule: "{{ .Values.backupSchedule }}"
  timeZone: 'Etc/UTC'
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: {{ .Values.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: hackmd-backup
              image: docker.ethquokkaops.io/ethquokkaops/ethdevops/hackmd-backup-tool:{{ .Values.imageTag }}
              imagePullPolicy: {{ .Values.imagePullPolicy }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: credential-cache
                  mountPath: /data/credentials
                - name: working-dir
                  mountPath: /data/working
                - name: archive-dir
                  mountPath: /data/archive
                - name: pgp-key-vol
                  mountPath: /var/keys
                  readOnly: true

              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
                - secretRef:
                    name: {{ .Release.Name }}-secret
          nodeSelector:
            kubernetes.io/os: linux
          volumes:
            - name: credential-cache
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-cred-cache
            - name: working-dir
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-working
            - name: archive-dir
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-archive
            - name: pgp-key-vol
              secret:
                secretName: {{ .Release.Name }}-pgp-key
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-cred-cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-working
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-archive
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
