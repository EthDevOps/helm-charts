apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-sync
  labels:
    app: {{ .Release.Name }}-sync
    app.kubernetes.io/component: sync
  annotations:
    # TODO: image runs as root and writes to /var/lib/teleport; revisit when
    # the upstream image supports a non-root user.
    kube-score/ignore: container-security-context-user-group-id
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  timeZone: {{ .Values.cronjob.timeZone | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  startingDeadlineSeconds: {{ .Values.cronjob.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-sync
            app.kubernetes.io/component: sync
        spec:
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          volumes:
            - name: teleport-persist
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-teleport
            - name: clusters-config
              configMap:
                name: {{ .Release.Name }}-clusters
          containers:
          - name: {{ .Release.Name }}-sync
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            securityContext:
              {{- toYaml .Values.containerSecurityContext | nindent 14 }}
            volumeMounts:
            - name: clusters-config
              mountPath: "/config"
            - name: teleport-persist
              mountPath: "/var/lib/teleport"
            envFrom:
              - secretRef:
                  name: {{ .Release.Name }}-config
            resources:
              {{- toYaml .Values.resources | nindent 14 }}
