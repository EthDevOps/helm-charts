apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  labels:
    {{- include "cubebackup.labels" . | nindent 4 }}
  annotations:
    # CubeBackup's official image runs as root (uid 0) and writes to
    # /opt/cubebackup at startup; we can't drop privileges without rebuilding.
    # Upstream only publishes `:latest` today — pin once a versioned tag exists.
    kube-score/ignore: container-security-context-user-group-id,container-image-tag
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cubebackup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cubebackup.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-config
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c", "cp -Rnv /opt/cubebackup/etc/* /tmp/"]
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.initContainer.resources | nindent 12 }}
          volumeMounts:
            - name: vol-config
              mountPath: /tmp
      containers:
        - name: cubebackup
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 80
              name: http
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: vol-config
              mountPath: /opt/cubebackup/etc
            - name: vol-db
              mountPath: /opt/cubebackup/db
            - name: vol-logs
              mountPath: /opt/cubebackup/log
            - name: vol-index
              mountPath: /opt/cubebackup/index
          {{- if .Values.maintenance }}
          command: ["/bin/sh", "-c", "touch /cubebackup_maintenance && exec /opt/cubebackup/bin/start.sh"]
          {{- end }}
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
        - name: vol-config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-config-pvc
        - name: vol-index
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-index-pvc
        - name: vol-logs
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-logs-pvc
        - name: vol-db
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-db-pvc
  labels:
    {{- include "cubebackup.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.db.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-config-pvc
  labels:
    {{- include "cubebackup.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-index-pvc
  labels:
    {{- include "cubebackup.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.index.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-logs-pvc
  labels:
    {{- include "cubebackup.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.logs.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
  labels:
    {{- include "cubebackup.labels" . | nindent 4 }}
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cubebackup.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
