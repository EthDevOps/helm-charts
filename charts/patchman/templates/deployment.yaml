apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-patchman
  annotations:
    # The upstream patchman image tracks the `main` branch tag; pinning to an
    # immutable digest requires upstream publishing versioned tags. Suppress
    # the kube-score check until that's available (see values.yaml TODO).
    kube-score/ignore: container-image-tag
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    app: {{ .Release.Name }}-patchman
    app.kubernetes.io/component: patchman
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: patchman
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ .Release.Name }}-patchman
        app.kubernetes.io/component: patchman
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.extraInitContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: {{ .Release.Name }}-patchman
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        volumeMounts:
        - name: sqlite
          mountPath: /var/lib/patchman/db
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: sqlite
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}-sqlite
