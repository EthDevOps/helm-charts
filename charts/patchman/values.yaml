baseDomain: patchman.example.com
image:
  repository: docker.ethquokkaops.io/ethquokkaops/ethdevops/patchman-docker
  # TODO: pin tag to an immutable digest/version once upstream publishes one.
  # The chart currently tracks the `main` branch tag, which kube-score flags
  # as not-pinned. Suppressed via container-image-tag ignore on the workload.
  tag: main
  pullPolicy: Always
commonAnnotations: {}
podAnnotations: {}
extraInitContainers: {}
resources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 1Gi

# Pod-level security context. fsGroup ensures the PVC mount is writable by
# the container's group; runAsNonRoot enforced at pod level.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# Container-level hardening.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Liveness/readiness split: readiness uses HTTP (verifies the app is actually
# serving), liveness uses tcpSocket (cheaper, distinct handler so kube-score
# doesn't flag pod-probes-identical).
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

service:
  type: ClusterIP
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls:
    secretName: ""

persistence:
  size: 10Gi

# NetworkPolicy: permissive defaults (in-cluster ingress to http, unrestricted
# egress). Tighten per environment.
networkPolicy:
  enabled: true
  ingress:
    - {}
  egress:
    - {}

# PodDisruptionBudget. maxUnavailable: 1 works for single-replica workloads
# while still signalling voluntary disruption tolerance.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
