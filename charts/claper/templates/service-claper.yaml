apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-claper-app
  {{- with .Values.service }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
spec:
  type: {{ (.Values.service).type | default "ClusterIP" }}
  ports:
    - name: http
      port: 4000
      targetPort: 4000
  selector:
    app: {{ .Release.Name }}-claper
