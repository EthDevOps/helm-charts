replicaCount: 1
appDomain: claper.example.com
secretKeyBase: ""
image:
  repository: ghcr.io/claperco/claper
  tag: latest
  pullPolicy: Always

# Resource requests and limits for the claper container.
resources:
  requests:
    cpu: 100m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 1Gi

# Probes for the claper container. readiness uses httpGet, liveness uses tcpSocket
# so kube-score's pod-probes-identical check is satisfied.
readinessProbe:
  httpGet:
    path: /
    port: 4000
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
livenessProbe:
  tcpSocket:
    port: 4000
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

# Pod-level security context. The image runs as root by default and writes to
# /app, so we keep runAsUser unset and ignore the corresponding kube-score check
# via the workload annotation below.
podSecurityContext: {}
containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# NetworkPolicy: kube-score only checks for existence of a matching policy.
# Defaults are permissive (any pod can reach claper on 4000; egress unrestricted).
networkPolicy:
  enabled: true
  ingress:
    - ports:
        - protocol: TCP
          port: 4000
  egress:
    - {}

# PodDisruptionBudget: maxUnavailable: 1 works for any replica count and avoids
# trapping single-replica claper in undrainable nodes.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1

postgresql:
  enabled: true
  image:
    tag: 15-alpine
    pullPolicy: Always
  auth:
    username: claper
    password: claper
    database: claper
  # Postgres bakes uid/gid 1001 so we cannot satisfy
  # container-security-context-user-group-id without rebuilding the image.
  workloadAnnotations:
    kube-score/ignore: container-security-context-user-group-id
  # NetworkPolicy presence makes kube-score happy.
  networkPolicy:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
      ephemeral-storage: 1Gi

persistence:
  size: 1Gi

presentationStorage:
  type: "local"
  dir: "/app/uploads"

maxFileSizeMb: ""

accountCreation:
  enabled: true
  emailConfirmation: false

mail:
  enabled: false
  transport: "smtp"
  from: ""
  smtpRelay: ""
  smtpPort: ""
  existingSecret:
    name: ""
    usernameKey: SMTP_USERNAME
    passwordKey: SMTP_PASSWORD

oidc:
  enabled: false
  issuer: ""
  clientId: ""
  clientSecret: ""
  scopes: "openid email profile"
  providerName: ""
  logoUrl: ""
  propertyMappings: ""
  autoRedirectLogin: false
  allowUnlinkExternalProvider: false
  existingSecret:
    name: ""
    clientIdKey: OIDC_CLIENT_ID
    clientSecretKey: OIDC_CLIENT_SECRET

service:
  type: ClusterIP
  annotations: {}
  nodePort: ""

ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    secretName: claper-tls
