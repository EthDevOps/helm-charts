{{- if .Values.workers.indexer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gnosis-safe.fullname" . }}-indexer-worker
  labels:
    {{- include "gnosis-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: indexer-worker
  annotations:
    # safe-transaction-service image is uid/gid 999 (cannot be set >10000
    # without rebuilding) and pulls `main`. Tracked via TODOs in values.yaml.
    kube-score/ignore: container-security-context-user-group-id,container-image-tag
spec:
  replicas: {{ .Values.workers.indexer.replicaCount }}
  selector:
    matchLabels:
      {{- include "gnosis-safe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: indexer-worker
  template:
    metadata:
      labels:
        {{- include "gnosis-safe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: indexer-worker
    spec:
      containers:
        - name: indexer-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["docker/web/celery/worker/run.sh"]
          env:
            - name: RUN_MIGRATIONS
              value: "1"
            - name: WORKER_QUEUES
              value: {{ .Values.workers.indexer.queues }}
          envFrom:
            - configMapRef:
                name: {{ include "gnosis-safe.fullname" . }}-config
            - secretRef:
                name: {{ include "gnosis-safe.fullname" . }}-secret
          readinessProbe:
            exec:
              command: ["sh", "-c", "celery -A config inspect ping -d celery@$HOSTNAME"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f celery >/dev/null"]
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.workerResources | nindent 12 }}
---
{{- end }}
