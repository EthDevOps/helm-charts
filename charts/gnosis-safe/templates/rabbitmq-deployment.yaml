{{- if .Values.rabbitmq.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gnosis-safe.fullname" . }}-rabbitmq
  labels:
    {{- include "gnosis-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
  annotations:
    # The official rabbitmq image runs as uid/gid 999 and cannot be raised
    # above 10000 without rebuilding the image.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gnosis-safe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rabbitmq
  template:
    metadata:
      labels:
        {{- include "gnosis-safe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: "{{ .Values.rabbitmq.image.repository }}:{{ .Values.rabbitmq.image.tag }}"
          imagePullPolicy: {{ .Values.rabbitmq.image.pullPolicy }}
          ports:
            - name: amqp
              containerPort: 5672
              protocol: TCP
          {{- if .Values.rabbitmq.healthcheck.enabled }}
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            timeoutSeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: amqp
            timeoutSeconds: 30
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.rabbitmqResources | nindent 12 }}
{{- end }}
