{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gnosis-safe.fullname" . }}
  labels:
    {{- include "gnosis-safe.labels" . | nindent 4 }}
spec:
  # All chart pods carry the shared selectorLabels (app.kubernetes.io/name
  # and app.kubernetes.io/instance) regardless of component, so this single
  # policy targets every workload in the release.
  podSelector:
    matchLabels:
      {{- include "gnosis-safe.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
