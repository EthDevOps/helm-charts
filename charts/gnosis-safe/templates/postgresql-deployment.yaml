{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gnosis-safe.fullname" . }}-postgresql
  labels:
    {{- include "gnosis-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  annotations:
    # The official postgres image initializes /var/lib/postgresql/data as
    # uid/gid 999 and cannot be relocated above 10000 without rebuilding.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gnosis-safe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "gnosis-safe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.auth.password }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
          {{- if .Values.postgresql.healthcheck.enabled }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.auth.username }}
            timeoutSeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgresql
            timeoutSeconds: 5
            periodSeconds: 30
          {{- end }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql
          resources:
            {{- toYaml .Values.postgresqlResources | nindent 12 }}
      volumes:
        - name: postgresql-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gnosis-safe.fullname" . }}-postgresql-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
