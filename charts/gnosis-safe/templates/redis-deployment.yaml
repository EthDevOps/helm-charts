{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gnosis-safe.fullname" . }}-redis
  labels:
    {{- include "gnosis-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  annotations:
    # The official redis image runs as uid/gid 999 and cannot be raised above
    # 10000 without rebuilding the image.
    kube-score/ignore: container-security-context-user-group-id
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "gnosis-safe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "gnosis-safe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- if .Values.redis.healthcheck.enabled }}
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            timeoutSeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            timeoutSeconds: 5
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.redisResources | nindent 12 }}
{{- end }}
