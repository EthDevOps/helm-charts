{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gnosis-safe.fullname" . }}-nginx
  labels:
    {{- include "gnosis-safe.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.nginx.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  # nginx runs as a sidecar in the main {{ include "gnosis-safe.fullname" . }}
  # deployment, so we target the main pod selector here.
  selector:
    {{- include "gnosis-safe.selectorLabels" . | nindent 4 }}
{{- end }}
