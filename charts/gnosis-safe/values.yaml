replicaCount: 1
rpcNode: "http://localhost:8545"

image:
  repository: docker.ethquokkaops.io/ethquokkaops/ethdevops/safe-transaction-service
  # TODO: pin to a specific tag instead of "main" to satisfy kube-score
  # container-image-tag. Currently ignored on workloads via kube-score/ignore.
  pullPolicy: Always
  tag: "main"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# Main app/nginx sidecar pods. The upstream safe-transaction-service image
# runs as uid 999 / gid 999 so we cannot set runAsUser/runAsGroup > 10000
# without rebuilding it (kube-score container-security-context-user-group-id
# is ignored on the workload metadata instead).
podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8888
  annotations: {}
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 512Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 2Gi
    ephemeral-storage: 1Gi

# Resources for the nginx sidecar in the main deployment.
nginxResources:
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
    ephemeral-storage: 512Mi

# Resources for the static-web frontend deployment.
staticWebResources:
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
    ephemeral-storage: 512Mi

# Resources for the postgresql deployment.
postgresqlResources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 1Gi

# Resources for the redis deployment.
redisResources:
  requests:
    cpu: 50m
    memory: 64Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
    ephemeral-storage: 512Mi

# Resources for the rabbitmq deployment.
rabbitmqResources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 128Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 512Mi

# Resources for celery worker / scheduler deployments.
workerResources:
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi
    ephemeral-storage: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Application-specific configuration
config:
  envFile: .env
  runMigrations: true

# External services
nginx:
  enabled: true
  image:
    repository: nginx
    # Pinned alpine version so kube-score container-image-tag passes.
    tag: 1.27-alpine
    pullPolicy: Always
  service:
    port: 8000
  configMap:
    enabled: true

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: Always
  service:
    port: 6379
  healthcheck:
    enabled: true

rabbitmq:
  enabled: true
  image:
    repository: rabbitmq
    tag: 3.13-alpine
    pullPolicy: Always
  service:
    port: 5672
  healthcheck:
    enabled: true

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: Always
  auth:
    username: postgres
    password: postgres
    database: postgres
  service:
    port: 5432
  healthcheck:
    enabled: true

# Workers configuration
workers:
  indexer:
    enabled: true
    queues: "default,indexing,processing"
    replicaCount: 1

  contractsTokens:
    enabled: true
    queues: "contracts,tokens"
    replicaCount: 1

  scheduler:
    enabled: true
    replicaCount: 1

# Flower (Celery monitoring)
flower:
  enabled: false
  service:
    port: 5555

# Static Web Frontend
staticWeb:
  enabled: true
  image:
    repository: docker.ethquokkaops.io/ethquokkaops/ethdevops/safe-global-web-docker
    # TODO: pin a specific tag instead of "main".
    tag: main
    pullPolicy: Always
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
    annotations: {}

# Persistence
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 8Gi

# NetworkPolicy permits all ingress/egress by default. Operators should
# tighten these rules per environment.
networkPolicy:
  enabled: true
  ingress:
    - {}
  egress:
    - {}

# PodDisruptionBudget for the main deployment.
podDisruptionBudget:
  enabled: true
  maxUnavailable: 1
